<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>El Local – Nave 7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --bg:#07070f;--s1:#0f0f1c;--s2:#161626;--s3:#1e1e32;--bd:#2a2a4a;
  --pk:#ff2d78;--cy:#00f5ff;--gn:#aaff00;--ye:#ffd600;--pu:#bf5fff;--or:#ff6b00;--rd:#ff3333;
  --tx:#ffffff;--mu:#7777aa;
  --fh:'Bebas Neue',cursive;--ff:'Space Mono',monospace;
}
html,body{width:100%;height:100dvh;background:var(--bg);color:var(--tx);font-family:var(--ff);overflow:hidden;user-select:none;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;}

/* HDR */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px 4px;background:var(--s1);border-bottom:2px solid var(--pk);flex-shrink:0;gap:6px;}
#hdr h1{font-family:var(--fh);font-size:20px;letter-spacing:3px;color:var(--pk);line-height:1;text-shadow:0 0 16px var(--pk);white-space:nowrap;}
#hdr h1 span{color:var(--cy);}
#pills{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.pill{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:20px;border:1px solid var(--bd);font-size:9px;font-weight:700;background:var(--s2);white-space:nowrap;}
.pill.gn{border-color:var(--gn);color:var(--gn);}
.pill.pk{border-color:var(--pk);color:var(--pk);}
.pill.cy{border-color:var(--cy);color:var(--cy);}
.pill.ye{border-color:var(--ye);color:var(--ye);}
.pill.pu{border-color:var(--pu);color:var(--pu);}
.pill.rd{border-color:var(--rd);color:var(--rd);}

/* TIMEBAR */
#tbar{height:3px;background:var(--s2);flex-shrink:0;}
#tfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--cy),var(--gn));transition:width .8s linear;}

/* SCENE */
#scene{flex:1;position:relative;overflow:hidden;}
#gamecanvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;}

/* NOTIFS */
#nbox{position:absolute;top:5px;left:7px;right:7px;z-index:20;pointer-events:none;}
.notif{background:rgba(15,15,28,0.97);border-left:3px solid var(--pk);padding:5px 8px;margin-bottom:3px;border-radius:0 7px 7px 0;font-size:9px;line-height:1.5;animation:nin .2s ease-out;max-width:100%;}
.notif.g{border-color:var(--gn);}
.notif.b{border-color:var(--cy);}
.notif.y{border-color:var(--ye);}
.notif.p{border-color:var(--pu);}
.notif.r{border-color:var(--rd);}
.nsend{font-size:7px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
@keyframes nin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* ACTION RADIAL */
#radial{position:absolute;z-index:30;display:none;pointer-events:none;}
#radial.on{display:block;pointer-events:auto;}
.rad-bg{position:absolute;border-radius:50%;background:rgba(15,15,28,0.92);border:2px solid var(--pk);box-shadow:0 0 20px rgba(255,45,120,0.4);}
.rad-btn{position:absolute;width:44px;height:44px;border-radius:50%;border:2px solid var(--bd);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transform:translate(-50%,-50%);transition:background .1s,border-color .1s;font-size:16px;gap:1px;}
.rad-btn:active{background:var(--s3);}
.rad-btn .rl{font-size:6px;color:var(--mu);text-transform:uppercase;text-align:center;line-height:1.1;}
.rad-btn.pk{border-color:var(--pk);}
.rad-btn.cy{border-color:var(--cy);}
.rad-btn.gn{border-color:var(--gn);}
.rad-btn.ye{border-color:var(--ye);}
.rad-btn.pu{border-color:var(--pu);}
.rad-btn.rd{border-color:var(--rd);}
#rad-title{position:absolute;transform:translate(-50%,-50%);font-family:var(--fh);font-size:11px;color:var(--pk);letter-spacing:1px;text-align:center;pointer-events:none;white-space:nowrap;}

/* FULL PANELS */
.panel{position:absolute;inset:0;background:rgba(7,7,15,0.98);z-index:40;display:none;flex-direction:column;}
.panel.on{display:flex;}
.phdr{padding:10px 14px 7px;border-bottom:2px solid var(--pk);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.phdr h2{font-family:var(--fh);font-size:22px;letter-spacing:2px;}
.phdr.cy{border-color:var(--cy);}
.phdr.cy h2{color:var(--cy);}
.phdr.gn{border-color:var(--gn);}
.phdr.gn h2{color:var(--gn);}
.phdr.ye{border-color:var(--ye);}
.phdr.ye h2{color:var(--ye);}
.phdr.pu{border-color:var(--pu);}
.phdr.pu h2{color:var(--pu);}
.phdr.pk h2{color:var(--pk);}
.panel-close{margin:7px 12px 9px;padding:10px;background:var(--s2);border:1px solid var(--pk);border-radius:8px;font-family:var(--ff);font-size:10px;font-weight:700;color:var(--pk);cursor:pointer;flex-shrink:0;}
.panel-close:active{opacity:.7;}

/* SHOP */
#shop-tabs{display:flex;gap:5px;padding:7px 12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#shop-tabs::-webkit-scrollbar{display:none;}
.stab{padding:4px 11px;border-radius:20px;border:1px solid var(--bd);font-size:8px;cursor:pointer;white-space:nowrap;background:var(--s2);}
.stab.on{background:var(--cy);color:#000;border-color:var(--cy);font-weight:700;}
#shop-grid{flex:1;overflow-y:auto;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.scard{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 7px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .12s,border-color .15s;text-align:center;}
.scard:active{transform:scale(.93);}
.scard.owned{border-color:var(--gn);opacity:.5;pointer-events:none;}
.scard.can{border-color:var(--pk);}
.scard-ico{width:64px;height:44px;display:flex;align-items:center;justify-content:center;}
.scard-ico canvas{image-rendering:pixelated;}
.scard-name{font-size:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;}
.scard-fx{font-size:7px;color:var(--cy);}
.scard-price{font-size:10px;font-weight:700;color:var(--gn);}

/* FRIENDS */
#fp-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px;}
.fcard{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:9px;}
.fcard.in{border-color:var(--gn);}
.fcard-ico{font-size:24px;flex-shrink:0;}
.fcard-info{flex:1;}
.fcard-name{font-size:10px;font-weight:700;text-transform:uppercase;}
.fcard-role{font-size:7px;color:var(--mu);margin-bottom:3px;}
.fcard-traits{display:flex;gap:3px;flex-wrap:wrap;}
.ft{font-size:6px;padding:1px 5px;border-radius:8px;border:1px solid var(--bd);}
.ft.g{border-color:var(--gn);color:var(--gn);}
.ft.r{border-color:var(--pk);color:var(--pk);}
.fcard-btn{padding:5px 9px;border-radius:7px;border:none;font-family:var(--ff);font-size:8px;font-weight:700;cursor:pointer;flex-shrink:0;}
.fcard-btn.inv{background:var(--pu);color:#fff;}
.fcard-btn.kick{background:var(--s3);color:var(--pk);border:1px solid var(--pk);}

/* STATS */
#stp-body{flex:1;overflow-y:auto;padding:12px 14px;}
.ss{margin-bottom:12px;}
.ss-title{font-size:7px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.sr{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.sl{font-size:8px;width:76px;flex-shrink:0;}
.st{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.sf{height:100%;border-radius:3px;transition:width .5s,background .5s;}
.sv{font-size:8px;font-weight:700;width:24px;text-align:right;}
.xpr{display:flex;justify-content:space-between;font-size:8px;margin-bottom:3px;}
.xpt{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.xpf{height:100%;background:linear-gradient(90deg,var(--pk),var(--ye));transition:width .5s;}

/* EVENT */
#evlay{position:absolute;inset:0;background:rgba(7,7,15,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;}
#evlay.on{display:flex;}
.evbox{background:var(--s1);border:2px solid var(--pk);border-radius:14px;padding:18px 15px;width:100%;text-align:center;max-height:85vh;overflow-y:auto;}
.evbox.cy{border-color:var(--cy);}
.evbox.gn{border-color:var(--gn);}
.evbox.rd{border-color:var(--rd);}
.ev-ico{font-size:44px;margin-bottom:6px;}
.ev-tit{font-family:var(--fh);font-size:26px;color:var(--pk);letter-spacing:2px;margin-bottom:5px;}
.ev-tit.cy{color:var(--cy);}
.ev-tit.gn{color:var(--gn);}
.ev-tit.rd{color:var(--rd);}
.ev-dsc{font-size:10px;color:var(--mu);line-height:1.7;margin-bottom:13px;}
.ev-btns{display:flex;gap:6px;flex-wrap:wrap;}
.ev-btn{flex:1;min-width:75px;padding:10px 5px;border-radius:8px;border:none;font-family:var(--ff);font-size:9px;font-weight:700;cursor:pointer;line-height:1.4;}
.ev-btn:active{opacity:.7;}
.ev-btn.p{background:var(--pk);color:#fff;}
.ev-btn.c{background:var(--cy);color:#000;}
.ev-btn.g{background:var(--gn);color:#000;}
.ev-btn.s{background:var(--s2);color:var(--tx);border:1px solid var(--bd);}
.ev-btn.d{background:#cc0000;color:#fff;}
.ev-btn.pu{background:var(--pu);color:#fff;}

/* BOT */
#bot{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:5px 7px 7px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;}
.bbt{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 2px 5px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform .1s;}
.bbt:active{transform:scale(.88);}
.bbt .bi{font-size:17px;}
.bbt .bl{font-size:6px;color:var(--mu);text-transform:uppercase;text-align:center;}
.bbt.hl{border-color:var(--pk);}
.bbt.cy{border-color:var(--cy);}
.bbt.gn{border-color:var(--gn);}
.bbt.pu{border-color:var(--pu);}

/* STATUS BAR */
#statusbar{display:flex;gap:3px;padding:3px 8px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#statusbar::-webkit-scrollbar{display:none;}
.sb-item{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.sb-lbl{font-size:7px;color:var(--mu);}
.sb-track{width:40px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.sb-fill{height:100%;border-radius:3px;transition:width .5s;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div>
      <h1>EL <span>LOCAL</span></h1>
      <div style="font-size:7px;color:var(--mu);letter-spacing:1px">NAVE 7 · MEJORADA · DÍA <span id="hday">1</span></div>
    </div>
    <div id="pills">
      <div class="pill gn">💶<span id="hp-m">400</span>€</div>
      <div class="pill ye">⭐<span id="hp-s">0</span></div>
      <div class="pill rd">❤️<span id="hp-hp">100</span></div>
      <div class="pill pu">🌀<span id="hp-dr">0</span></div>

  <!-- STATUS BARS -->

  <div id="scene">

    <!-- RADIAL MENU -->

      <div class="rad-bg" id="rad-bg"></div>

    <!-- EVENT -->

    <!-- SHOP PANEL -->

      <div id="shop-tabs"></div>

      <div id="fp-list"></div>

    <!-- STATS -->
    <div class="panel" id="stpanel">
      <div class="phdr ye"><h2>📊 STATS</h2><div style="font-size:9px;color:var(--mu)">Nivel <span id="stp-lvl">1</span></div></div>

      <div class="phdr" style="border-color:var(--pu)"><h2 style="color:var(--pu)">🌿 EL SECO</h2><div style="font-size:9px;color:var(--mu)">Material de primera</div></div>
      <div id="drug-list" style="flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;"></div>
      <button class="panel-close" style="border-color:var(--pu);color:var(--pu)" onclick="closeDrug()">✕ CERRAR</button>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  CANVAS + ISO ENGINE
// ═══════════════════════════════════════════════════════
const cv  = document.getElementById('gamecanvas');
const ctx = cv.getContext('2d');
const SC = window.devicePixelRatio || 2;
let CW, CH;

function resize() {
  const el = document.getElementById('scene');
  CW = el.clientWidth; CH = el.clientHeight;
  cv.width = CW*SC; cv.height = CH*SC;
  cv.style.width = CW+'px'; cv.style.height = CH+'px';
  ctx.scale(SC, SC);
  ctx.imageSmoothingEnabled = false;
}

const TW=40, TH=20, WH=56;
const GRID=9;

function iso(gx,gy,gz=0){
  const ox=CW/2, oy=CH*0.28;
  return { x: ox+(gx-gy)*TW/2, y: oy+(gx+gy)*TH/2 - gz*TH };
}
function screenToGrid(sx,sy){
  const ox=CW/2, oy=CH*0.28;
  const rx=sx-ox, ry=sy-oy;
  return { gx: Math.round((rx/(TW/2)+ry/(TH/2))/2 - 0.5), gy: Math.round((ry/(TH/2)-rx/(TW/2))/2 - 0.5) };
}

// ═══════════════════════════════════════════════════════
//  PIXEL ART FURNITURE — drawn with canvas calls
// ═══════════════════════════════════════════════════════

// Core iso box primitive
function isoBox(gx,gy,fw,fh,fz, cTop,cFront,cSide, outline=true){
  const s = iso(gx+fw/2, gy+fh/2);
  const W2=fw*TW/2, H2=fh*TH/2, Z=fz*TH*2.4;
  const lw=outline?0.5:0;

  // left face
  ctx.beginPath();
  ctx.moveTo(s.x-W2, s.y);
  ctx.lineTo(s.x,    s.y+H2);
  ctx.lineTo(s.x,    s.y+H2-Z);
  ctx.lineTo(s.x-W2, s.y-Z);
  ctx.closePath();
  ctx.fillStyle=cSide; ctx.fill();
  if(outline){ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=lw;ctx.stroke();}

  // right face
  ctx.beginPath();
  ctx.moveTo(s.x,    s.y+H2);
  ctx.lineTo(s.x+W2, s.y);
  ctx.lineTo(s.x+W2, s.y-Z);
  ctx.lineTo(s.x,    s.y+H2-Z);
  ctx.closePath();
  ctx.fillStyle=cFront; ctx.fill();
  if(outline){ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=lw;ctx.stroke();}

  // top face
  ctx.beginPath();
  ctx.moveTo(s.x,    s.y-Z);
  ctx.lineTo(s.x+W2, s.y-Z);
  ctx.lineTo(s.x,    s.y+H2-Z);
  ctx.lineTo(s.x-W2, s.y-Z);
  ctx.closePath();
  ctx.fillStyle=cTop; ctx.fill();
  if(outline){ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=lw;ctx.stroke();}

  return {s,W2,H2,Z};
}

// Highlight strip on top-left edge of top face
function isoHighlight(s,W2,H2,Z,col='rgba(255,255,255,0.18)'){
  ctx.beginPath();
  ctx.moveTo(s.x-W2,s.y-Z);
  ctx.lineTo(s.x,   s.y-Z);
  ctx.lineTo(s.x,   s.y+H2-Z);
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
}

// ── SOFA ──────────────────────────────────────────────
function drawSofa(gx,gy){
  // Base
  isoBox(gx,gy,2,1,0.45,'#7c3aed','#6d28d9','#5b21b6');
  const s=iso(gx+1,gy+0.5);
  const W2=TW,H2=TH/2,Z=0.45*TH*2.4;
  // Backrest
  isoBox(gx,gy,2,0.25,1.1,'#5b21b6','#4c1d95','#3b0d8c');
  // Cushions
  [gx+0.1,gx+1.05].forEach(cx=>{
    const cs=iso(cx+0.4,gy+0.5);
    ctx.beginPath();
    ctx.ellipse(cs.x,cs.y-Z-4,TW*0.23,TH*0.32,0,0,Math.PI*2);
    ctx.fillStyle='#a78bfa'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=0.5;ctx.stroke();
    // cushion highlight
    ctx.beginPath();
    ctx.ellipse(cs.x-3,cs.y-Z-6,TW*0.08,TH*0.12,0.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fill();
  });
  // Armrests
  isoBox(gx,gy,0.2,1,0.8,'#6d28d9','#5b21b6','#4c1d95');
  isoBox(gx+1.8,gy,0.2,1,0.8,'#6d28d9','#5b21b6','#4c1d95');
  // Legs
  [[gx+0.1,gy+0.1],[gx+1.8,gy+0.1],[gx+0.1,gy+0.8],[gx+1.8,gy+0.8]].forEach(([lx,ly])=>{
    isoBox(lx,ly,0.15,0.15,0.2,'#1e1b4b','#1e1b4b','#12105e');
  });
}

// ── BED ───────────────────────────────────────────────
function drawBed(gx,gy){
  // Frame
  const {s,W2,H2,Z}=isoBox(gx,gy,2,2,0.25,'#92400e','#78350f','#6b2d0a');
  // Mattress
  isoBox(gx+0.05,gy+0.05,1.9,1.9,0.55,'#bfdbfe','#93c5fd','#7eb5f0');
  const ms=iso(gx+1,gy+1);
  const mZ=(0.25+0.55)*TH*2.4;
  // Sheet stripes
  for(let i=0;i<4;i++){
    ctx.beginPath();
    ctx.moveTo(ms.x-TW+i*14, ms.y-mZ+4);
    ctx.lineTo(ms.x+i*14,    ms.y-mZ+TH);
    ctx.strokeStyle='rgba(147,197,253,0.4)';ctx.lineWidth=2;ctx.stroke();
  }
  // Pillow
  const ps=iso(gx+1,gy+0.35);
  ctx.beginPath();
  ctx.ellipse(ps.x,ps.y-mZ,TW*0.38,TH*0.48,0,0,Math.PI*2);
  ctx.fillStyle='#e0f2fe';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=0.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(ps.x-4,ps.y-mZ-3,TW*0.1,TH*0.14,0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
  // Headboard
  isoBox(gx,gy,2,0.15,2.2,'#b45309','#92400e','#78350f');
  // Legs
  [[gx+0.1,gy+0.1],[gx+1.8,gy+0.1],[gx+0.1,gy+1.8],[gx+1.8,gy+1.8]].forEach(([lx,ly])=>{
    isoBox(lx,ly,0.15,0.15,0.25,'#292524','#1c1917','#111111');
  });
}

// ── FRIDGE ────────────────────────────────────────────
function drawFridge(gx,gy){
  const {s,W2,H2,Z}=isoBox(gx,gy,1,1,2.6,'#a7f3d0','#6ee7b7','#34d399');
  isoHighlight(s,W2,H2,Z);
  // Door lines
  const ds=iso(gx+0.5,gy+1);
  ctx.strokeStyle='rgba(52,211,153,0.5)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(ds.x+2,ds.y-Z*0.5);ctx.lineTo(ds.x+W2-2,ds.y-Z*0.5-TH*0.25);ctx.stroke();
  // Handle right face
  ctx.strokeStyle='#d1fae5';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(ds.x+W2-4,ds.y-Z*0.75);ctx.lineTo(ds.x+W2-4,ds.y-Z*0.45);ctx.stroke();
  // Logo
  ctx.fillStyle='#065f46';ctx.font='bold 6px monospace';
  ctx.fillText('FRÍO',ds.x-8,ds.y-Z*0.5);
  // Freezer line on front
  const fs=iso(gx+0.5,gy+1);
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(fs.x,fs.y-Z*0.65);ctx.lineTo(fs.x+W2,fs.y-Z*0.65-TH*0.25);ctx.stroke();
}

// ── TV ────────────────────────────────────────────────
function drawTV(gx,gy, isOn=false){
  // Stand
  isoBox(gx+0.35,gy+0.35,0.3,0.3,0.3,'#374151','#1f2937','#111827');
  const {s,W2,H2,Z}=isoBox(gx,gy,1,1,1.9,'#111827','#0f172a','#0a0f1e');
  isoHighlight(s,W2,H2,Z,'rgba(255,255,255,.06)');
  // Screen area on right face
  const scx=s.x+W2*0.15, scy=s.y-Z*0.82, scw=W2*0.7, sch=Z*0.65;
  ctx.beginPath();
  ctx.moveTo(scx,    scy);
  ctx.lineTo(scx+scw,scy-TH*0.35);
  ctx.lineTo(scx+scw,scy+sch-TH*0.35);
  ctx.lineTo(scx,    scy+sch);
  ctx.closePath();
  ctx.fillStyle=isOn?'#0f3460':'#060d1a';ctx.fill();
  if(isOn){
    // Screen glow
    ctx.fillStyle='rgba(0,245,255,0.12)';ctx.fill();
    ctx.fillStyle='#1a6090';
    ctx.fillRect(scx+2,scy+4,scw*0.4,3);
    ctx.fillRect(scx+2,scy+9,scw*0.6,2);
    ctx.fillRect(scx+2,scy+13,scw*0.3,2);
    // Power LED
    ctx.beginPath();ctx.arc(s.x+W2-5,s.y-Z*0.1,2,0,Math.PI*2);
    ctx.fillStyle='#00ff88';ctx.fill();
  }
  // Brand
  ctx.fillStyle='rgba(255,255,255,.08)';ctx.font='bold 5px monospace';
  ctx.fillText('LGTV',s.x+2,s.y-Z*0.08);
}

// ── SPEAKER ───────────────────────────────────────────
function drawSpeaker(gx,gy, isOn=false){
  const {s,W2,H2,Z}=isoBox(gx,gy,1,1,1.8,'#1e1e2e','#15152a','#0f0f1e');
  isoHighlight(s,W2,H2,Z,'rgba(255,255,255,.04)');
  // Woofer cone
  const wx=s.x+W2*0.4, wy=s.y-Z*0.5;
  ctx.beginPath();ctx.arc(wx,wy,TW*0.25,0,Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();
  ctx.strokeStyle=isOn?'#ff2d78':'#333';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(wx,wy,TW*0.14,0,Math.PI*2);
  ctx.fillStyle=isOn?'#ff2d78':'#222';ctx.fill();
  ctx.beginPath();ctx.arc(wx,wy,TW*0.06,0,Math.PI*2);
  ctx.fillStyle='#444';ctx.fill();
  // Tweeter
  ctx.beginPath();ctx.arc(wx,wy-TW*0.3,TW*0.07,0,Math.PI*2);
  ctx.fillStyle='#555';ctx.fill();
  // Buttons on left face
  [[0.3,0.4],[0.3,0.55],[0.3,0.7]].forEach(([ty,tx2])=>{
    const bs=iso(gx+tx2,gy+ty);
    ctx.beginPath();ctx.arc(bs.x-W2*0.4,bs.y-Z*0.45,2,0,Math.PI*2);
    ctx.fillStyle=isOn?'#00f5ff':'#333';ctx.fill();
  });
  if(isOn){
    // Sound waves
    for(let r=1;r<4;r++){
      ctx.beginPath();ctx.arc(wx-W2*0.7,wy,r*7,-.6,.6);
      ctx.strokeStyle=`rgba(255,45,120,${0.4/r})`;ctx.lineWidth=1;ctx.stroke();
    }
  }
}

// ── DESK (Mesa de trabajo) ─────────────────────────────
function drawDesk(gx,gy){
  // Legs
  [[gx+0.05,gy+0.05],[gx+1.7,gy+0.05],[gx+0.05,gy+0.85],[gx+1.7,gy+0.85]].forEach(([lx,ly])=>{
    isoBox(lx,ly,0.12,0.12,0.7,'#1a1a2e','#12122a','#0a0a1e');
  });
  // Surface
  const {s,W2,H2,Z}=isoBox(gx,gy,1.9,1,0.75,'#92400e','#78350f','#5c2700');
  isoHighlight(s,W2,H2,Z,'rgba(255,255,255,.08)');
  // Items: monitor, coffee, papers
  const ms=iso(gx+0.9,gy+0.35);
  ctx.fillStyle='#0f172a';ctx.fillRect(ms.x-8,ms.y-Z-18,16,12);
  ctx.fillStyle='#1e3a5f';ctx.fillRect(ms.x-7,ms.y-Z-17,14,10);
  ctx.fillStyle='rgba(0,245,255,0.3)';ctx.fillRect(ms.x-7,ms.y-Z-17,14,10);
  ctx.fillStyle='#334155';ctx.fillRect(ms.x-2,ms.y-Z-6,4,6);
  // Coffee cup
  const cs2=iso(gx+0.25,gy+0.7);
  ctx.fillStyle='#6b7280';ctx.fillRect(cs2.x-4,cs2.y-Z-8,7,7);
  ctx.fillStyle='#3f1d00';ctx.fillRect(cs2.x-3,cs2.y-Z-7,5,5);
  // Paper
  const ps=iso(gx+1.5,gy+0.7);
  ctx.fillStyle='#f8fafc';ctx.fillRect(ps.x-6,ps.y-Z-5,10,7);
  for(let i=0;i<3;i++){ctx.fillStyle='#94a3b8';ctx.fillRect(ps.x-5,ps.y-Z-4+i*2,7,0.5);}
}

// ── BAR ───────────────────────────────────────────────
function drawBar(gx,gy){
  // Main counter
  const {s,W2,H2,Z}=isoBox(gx,gy,3,1,1.5,'#44260a','#321a05','#1e1003');
  // Counter top wood
  ctx.beginPath();
  ctx.moveTo(s.x-W2,  s.y-Z);
  ctx.lineTo(s.x+W2,  s.y-Z);
  ctx.lineTo(s.x,     s.y+H2-Z);
  ctx.lineTo(s.x-W2*2,s.y-Z);
  ctx.closePath();
  ctx.fillStyle='#78350f';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=0.5;ctx.stroke();
  // Wood grain
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(s.x-W2+i*16,s.y-Z);
    ctx.lineTo(s.x-W2*0.5+i*16,s.y+H2-Z);
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=0.7;ctx.stroke();
  }
  // Brass rail
  ctx.strokeStyle='#b45309';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(s.x-W2+3,s.y-Z*0.3);ctx.lineTo(s.x+W2-3,s.y-Z*0.3-TH*0.3);ctx.stroke();
  // Bottles on top
  [[s.x-TW,s.y-Z-14,'#ef4444'],[s.x-TW*0.3,s.y-Z-16,'#22c55e'],[s.x+TW*0.4,s.y-Z-12,'#3b82f6']].forEach(([bx,by,bc])=>{
    ctx.fillStyle=bc;ctx.fillRect(bx-2,by,4,12);
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(bx-1,by+1,1,8);
    ctx.fillStyle='#555';ctx.fillRect(bx-1,by-2,3,3);
  });
  // Tap
  const ts=iso(gx+2.5,gy+0.5);
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(ts.x,ts.y-Z);ctx.lineTo(ts.x,ts.y-Z-14);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ts.x,ts.y-Z-14);ctx.lineTo(ts.x+6,ts.y-Z-14);ctx.stroke();
  ctx.fillStyle='#b45309';ctx.beginPath();ctx.arc(ts.x+6,ts.y-Z-14,3,0,Math.PI*2);ctx.fill();
}

// ── TATTOO CHAIR ───────────────────────────────────────
function drawTattooChair(gx,gy){
  // Base/legs
  isoBox(gx+0.3,gy+0.3,0.4,0.4,0.4,'#1f2937','#111827','#0a0f1e');
  // Seat
  const {s,W2,H2,Z}=isoBox(gx,gy,1,1,0.7,'#dc2626','#b91c1c','#991b1b');
  isoHighlight(s,W2,H2,Z,'rgba(255,255,255,.1)');
  // Headrest
  isoBox(gx+0.3,gy,0.4,0.2,1.4,'#b91c1c','#991b1b','#7f1d1d');
  // Armrest pad
  isoBox(gx+0.7,gy+0.35,0.6,0.1,0.9,'#ef4444','#dc2626','#b91c1c');
  // Needle arm
  const as=iso(gx+0.7,gy+0.3);
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=1.5;

}

// ── LAMP ──────────────────────────────────────────────
function drawLamp(gx,gy, isOn=true){
  const s=iso(gx+0.5,gy+0.5);
  // Base
  ctx.beginPath();ctx.ellipse(s.x,s.y,TW*0.2,TH*0.28,0,0,Math.PI*2);
  ctx.fillStyle='#374151';ctx.fill();
  // Pole
  ctx.strokeStyle='#6b7280';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y-TH*3.6);ctx.stroke();
  // Bend
  ctx.beginPath();ctx.moveTo(s.x,s.y-TH*3.6);ctx.lineTo(s.x+TW*0.25,s.y-TH*4.2);ctx.stroke();
  // Shade
  ctx.beginPath();
  ctx.moveTo(s.x+TW*0.05,s.y-TH*3.8);
  ctx.lineTo(s.x+TW*0.45,s.y-TH*3.8);
  ctx.lineTo(s.x+TW*0.35,s.y-TH*4.4);
  ctx.lineTo(s.x+TW*0.15,s.y-TH*4.4);
  ctx.closePath();
  ctx.fillStyle=isOn?'#fde68a':'#d97706';ctx.fill();
  if(isOn){
    ctx.fillStyle='rgba(253,230,138,0.08)';
    ctx.beginPath();ctx.arc(s.x+TW*0.25,s.y-TH*3.9,TW*0.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(253,230,138,0.15)';
    ctx.beginPath();ctx.arc(s.x+TW*0.25,s.y-TH*3.9,TW*0.4,0,Math.PI*2);ctx.fill();
  }
}

// ── MIC STAND ─────────────────────────────────────────
function drawMic(gx,gy){
  const s=iso(gx+0.5,gy+0.5);
  ctx.strokeStyle='#6b7280';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y-TH*4);ctx.stroke();
  // Tripod base
  [[-12,8],[12,8],[0,-8]].forEach(([dx,dy])=>{
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+dx,s.y+dy);ctx.stroke();
  });
  // Mic body
  ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(s.x,s.y-TH*4,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#374151';ctx.beginPath();ctx.arc(s.x,s.y-TH*4,5,0,Math.PI*2);ctx.fill();
  // Grill mesh
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;
  for(let i=-4;i<=4;i+=2){ctx.beginPath();ctx.moveTo(s.x+i,s.y-TH*4-4);ctx.lineTo(s.x+i,s.y-TH*4+4);ctx.stroke();}
  // LED red on
  ctx.beginPath();ctx.arc(s.x+4,s.y-TH*3.5,2,0,Math.PI*2);ctx.fillStyle='#ef4444';ctx.fill();
}

// ── CAMERA ────────────────────────────────────────────
function drawCamera(gx,gy){
  const s=iso(gx+0.5,gy+0.5);
  // Tripod
  ctx.strokeStyle='#374151';ctx.lineWidth=1.5;
  [[-10,10],[10,10],[0,-6]].forEach(([dx,dy])=>{
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+dx,s.y+dy);ctx.stroke();
  });
  // Body
  ctx.fillStyle='#1e1e2e';ctx.fillRect(s.x-10,s.y-TH*2-8,20,14);
  ctx.fillStyle='#111';ctx.fillRect(s.x-9,s.y-TH*2-7,18,12);
  // Lens
  ctx.beginPath();ctx.arc(s.x,s.y-TH*2,7,0,Math.PI*2);ctx.fillStyle='#0f172a';ctx.fill();
  ctx.beginPath();ctx.arc(s.x,s.y-TH*2,5,0,Math.PI*2);ctx.fillStyle='#1e3a5f';ctx.fill();
  ctx.beginPath();ctx.arc(s.x,s.y-TH*2,3,0,Math.PI*2);ctx.fillStyle='#0369a1';ctx.fill();
  ctx.beginPath();ctx.arc(s.x-1,s.y-TH*2-1,1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();
  // Record LED
  ctx.beginPath();ctx.arc(s.x+7,s.y-TH*2-3,2,0,Math.PI*2);ctx.fillStyle='#ef4444';ctx.fill();
}

// ── PLAYSTATION ───────────────────────────────────────
function drawPlaystation(gx,gy){
  // Console
  const {s,W2,H2,Z}=isoBox(gx+0.1,gy+0.3,0.8,0.4,0.25,'#1e3a8a','#1e3a8a','#1d4ed8');
  // Screen above (TV style mini)
  isoBox(gx,gy,1,1,0.2,'#0f172a','#0a0f1e','#060d1a');
  const gs=iso(gx+0.5,gy+1);
  const gZ=0.2*TH*2.4;
  ctx.fillStyle='#1e3a8a';
  ctx.fillRect(gs.x-TW*0.3,gs.y-gZ-TH*1.5,TW*0.8,TH*1.2);
  ctx.fillStyle='rgba(30,58,138,0.5)';
  ctx.fillRect(gs.x-TW*0.28,gs.y-gZ-TH*1.45,TW*0.76,TH*1.15);
  // Controller
  ctx.fillStyle='#1e3a8a';ctx.fillRect(gs.x-8,gs.y-gZ+2,14,7);
  ctx.fillStyle='#60a5fa';
  [[3,3],[6,3],[4,1],[4,5]].forEach(([dx,dy])=>{
    ctx.beginPath();ctx.arc(gs.x-8+dx,gs.y-gZ+2+dy,1,0,Math.PI*2);ctx.fill();
  });
}

// ── PLANT ─────────────────────────────────────────────
function drawPlant(gx,gy){
  isoBox(gx+0.25,gy+0.25,0.5,0.5,0.45,'#92400e','#78350f','#5c2700');
  const s=iso(gx+0.5,gy+0.5);
  const Z=0.45*TH*2.4;
  // Soil
  ctx.beginPath();ctx.ellipse(s.x,s.y-Z,TW*0.22,TH*0.28,0,0,Math.PI*2);
  ctx.fillStyle='#44200a';ctx.fill();
  // Leaves
  [[-6,-18,14,20,0.2,'#166534'],[6,-22,12,18,-0.3,'#15803d'],
   [-10,-14,10,16,0.5,'#14532d'],[8,-16,11,17,-0.2,'#166534'],
   [0,-26,9,16,0,'#15803d'],[4,-12,13,14,0.4,'#14532d']].forEach(([dx,dy,rx,ry,angle,col])=>{
    ctx.beginPath();ctx.ellipse(s.x+dx,s.y-Z+dy,rx,ry,angle,0,Math.PI*2);
    ctx.fillStyle=col;ctx.fill();
    // Leaf vein
    ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(s.x+dx,s.y-Z+dy+ry*0.5);ctx.lineTo(s.x+dx,s.y-Z+dy-ry*0.5);ctx.stroke();
  });
}

// ── BEANBAG ───────────────────────────────────────────
function drawBeanbag(gx,gy){
  const s=iso(gx+0.5,gy+0.5);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(s.x,s.y+2,TW*0.4,TH*0.4,0,0,Math.PI*2);ctx.fill();
  // Body
  ctx.beginPath();ctx.ellipse(s.x,s.y-TH*0.45,TW*0.42,TH*0.6,0,0,Math.PI*2);
  ctx.fillStyle='#7c3aed';ctx.fill();
  ctx.strokeStyle='#6d28d9';ctx.lineWidth=1;ctx.stroke();
  // Highlight
  ctx.beginPath();ctx.ellipse(s.x-5,s.y-TH*0.65,TW*0.12,TH*0.18,0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(196,181,253,0.35)';ctx.fill();
  // Seam
  ctx.strokeStyle='rgba(109,40,217,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.ellipse(s.x,s.y-TH*0.45,TW*0.42,TH*0.6,0,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
}

// ── TRASH BIN ─────────────────────────────────────────
function drawTrashBin(gx,gy){
  const {s,W2,H2,Z}=isoBox(gx+0.2,gy+0.2,0.6,0.6,1.0,'#374151','#1f2937','#111827');
  // Lid
  isoBox(gx+0.15,gy+0.15,0.7,0.7,0.12,'#4b5563','#374151','#1f2937');
  // Handle
  const hs=iso(gx+0.5,gy+0.5);
  ctx.strokeStyle='#6b7280';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(hs.x,hs.y-Z-4,5,Math.PI,0);ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=0.5;
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(hs.x+2,hs.y-Z*0.2-i*8);
    ctx.lineTo(hs.x+W2-2,hs.y-Z*0.2-i*8-TH*0.12);
    ctx.stroke();
  }
}

// ── MATTRESS ──────────────────────────────────────────
function drawMattress(gx,gy){
  const {s,W2,H2,Z}=isoBox(gx,gy,2,1,0.28,'#fda4af','#fb7185','#f43f5e');
  // Stripes
  for(let i=0;i<4;i++){
    ctx.beginPath();
    ctx.moveTo(s.x-W2+i*16,s.y-Z);
    ctx.lineTo(s.x-W2+i*16+TW,s.y-Z+TH);
    ctx.strokeStyle='rgba(251,113,133,0.35)';ctx.lineWidth=4;ctx.stroke();
  }
  isoHighlight(s,W2,H2,Z,'rgba(255,255,255,.12)');
  // Buttons
  [[0,-0.4],[0.5,-0.4],[1,-0.4],[1.5,-0.4]].forEach(([bx,by])=>{
    const bs=iso(gx+bx+0.25,gy+0.5+by);
    ctx.beginPath();ctx.arc(bs.x,bs.y-Z,2,0,Math.PI*2);
    ctx.fillStyle='#be123c';ctx.fill();
  });
}

// ── DRUG TABLE ────────────────────────────────────────
function drawDrugTable(gx,gy){
  isoBox(gx+0.05,gy+0.05,0.9,0.9,0.5,'#1c1c1c','#111','#0a0a0a');
  const s=iso(gx+0.5,gy+0.5);
  const Z=0.5*TH*2.4;
  // White lines on top
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillRect(s.x-10,s.y-Z-2,20,1);
  ctx.fillRect(s.x-10,s.y-Z+1,20,1);
  // Rolled paper
  ctx.fillStyle='#f8f4e3';ctx.fillRect(s.x-4,s.y-Z-5,8,3);
  ctx.fillStyle='#d97706';ctx.fillRect(s.x-1,s.y-Z-3,2,8);
  // Baggie
  ctx.fillStyle='rgba(134,239,172,0.6)';
  ctx.fillRect(s.x+5,s.y-Z-7,8,8);
  ctx.strokeStyle='rgba(134,239,172,0.9)';ctx.lineWidth=0.5;ctx.strokeRect(s.x+5,s.y-Z-7,8,8);
}

// ── MINI FRIDGE (alcohol) ─────────────────────────────
function drawMiniFridge(gx,gy){
  const {s,W2,H2,Z}=isoBox(gx,gy,1,1,1.4,'#1e3a8a','#1d3461','#162850');
  isoHighlight(s,W2,H2,Z,'rgba(255,255,255,.07)');
  // Logo
  ctx.fillStyle='rgba(96,165,250,.6)';ctx.font='bold 6px monospace';
  ctx.fillText('🍺',s.x-4,s.y-Z*0.5);
  // Handle
  ctx.strokeStyle='#93c5fd';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(s.x+W2-4,s.y-Z*0.75);ctx.lineTo(s.x+W2-4,s.y-Z*0.45);ctx.stroke();
  // LED
  ctx.beginPath();ctx.arc(s.x+W2-8,s.y-Z*0.1,2,0,Math.PI*2);
  ctx.fillStyle='#22c55e';ctx.fill();
}

// ── WALL GRAFFITI / POSTER ────────────────────────────
function drawPoster(gx,gy,col1,col2){
  const s=iso(gx,gy);
  const wx=s.x+2, wy=s.y-WH+12;
  // Frame
  ctx.fillStyle='#1a1a2e';ctx.fillRect(wx,wy,22,28);
  ctx.strokeStyle=col1;ctx.lineWidth=1.5;ctx.strokeRect(wx,wy,22,28);
  // Design
  ctx.fillStyle=col1;ctx.fillRect(wx+2,wy+2,18,8);
  ctx.fillStyle=col2;
  for(let i=0;i<3;i++){ctx.fillRect(wx+2,wy+12+i*5,14,2);}
  ctx.fillStyle=col1;ctx.fillRect(wx+2,wy+22,10,4);
}

function initGame(){
  G={
    day:1, time:0,
    money:400, seg:0, rep:50, hp:100,
    energy:100, hunger:80, sleep:80, happy:70,
    trash:5, chaos:0, drug:0,
    xp:0, level:1,

    skills:{cantar:0,tatuar:0,fotos:0,stream:0},
    placed:[], friends:[],
    isParty:false,
    player:{gx:4,gy:4,tx:4,ty:4,state:'idle',facing:'right',bubble:null,bubbleT:0},
    running:true, gameover:false,
  };
  closeAllPanels();
  document.getElementById('evlay').classList.remove('on');
  updateHUD();
  if(animId) cancelAnimationFrame(animId);
  lastT=performance.now(); secAcc=0;
  animId=requestAnimationFrame(loop);

}

// ═══════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════
function loop(now){
  const dt=Math.min((now-lastT)/1000,.12);
  lastT=now;
  if(G.running&&!G.gameover) update(dt);
  render();
  animId=requestAnimationFrame(loop);
}

function update(dt){
  secAcc+=dt;
  G.time+=dt/DAY_S;
  document.getElementById('tfill').style.width=(Math.min(G.time,1)*100)+'%';
  document.getElementById('hday').textContent=G.day;

  // Move player
  const p=G.player;
  const dx=p.tx-p.gx, dy=p.ty-p.gy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>0.1){
    const spd=2.8;
    p.gx+=(dx/dist)*spd*dt; p.gy+=(dy/dist)*spd*dt;
    p.state='walking'; p.facing=dx<0?'left':'right';
  } else { p.gx=p.tx; p.gy=p.ty; if(p.state==='walking') p.state='idle'; }
  if(p.bubbleT>0){p.bubbleT-=dt; if(p.bubbleT<=0) p.bubble=null;}

  // NPC wandering AI
  G.friends.forEach((f,i)=>{
    if(!f.tx){f.tx=1+Math.random()*(GRID-2); f.ty=1+Math.random()*(GRID-2);}
    if(Math.random()<0.004){f.tx=1+Math.random()*(GRID-2); f.ty=1+Math.random()*(GRID-2);}
    const fdx=f.tx-f.gx, fdy=f.ty-f.gy;
    const fd=Math.sqrt(fdx*fdx+fdy*fdy);
    if(fd>0.1){
      const fspd=1.4+Math.random()*0.6;
      f.gx+=(fdx/fd)*fspd*dt; f.gy+=(fdy/fd)*fspd*dt;
      f.state='walking'; f.facing=fdx<0?'left':'right';
    } else { f.state=G.isParty?'partying':'idle'; }
    if(f.bubbleT>0){f.bubbleT-=dt; if(f.bubbleT<=0) f.bubble=null;}

    // NPCs do random actions
    if(Math.random()<0.002){
      const def=FRIEND_DEFS.find(d=>d.id===f.id);
      if(def){
        f.bubble=randomLine(def);
        f.bubbleT=3;
      }
    }
    // NPCs use furniture
    if(Math.random()<0.003&&G.placed.length>0){
      const target=G.placed[Math.floor(Math.random()*G.placed.length)];
      if(target){f.tx=target.gx+0.5; f.ty=target.gy+0.5;}
    }
  });

  if(secAcc>=1){
    secAcc-=1;
    G.hunger =Math.max(0,G.hunger -(0.8+G.friends.length*0.02));
    G.sleep  =Math.max(0,G.sleep  -0.6);
    G.energy =Math.max(0,G.energy -0.4);
    G.happy  =Math.max(0,G.happy  -0.3);
    G.trash  =Math.min(100,G.trash+(0.3+G.friends.length*0.05));
    G.chaos  =Math.max(0,G.chaos  -0.15);
    G.drug   =Math.max(0,G.drug   -0.8);

    // Furniture effects
    if(G.placed.some(p=>p.id==='plant'))     G.trash=Math.max(0,G.trash-0.3);
    if(G.placed.some(p=>p.id==='trashbin'))  G.trash=Math.max(0,G.trash-0.5);
    if(G.placed.some(p=>p.id==='fridge'))    G.hunger=Math.min(100,G.hunger+0.3);
    if(G.placed.some(p=>p.id==='minifridge')&&G.isParty) G.happy=Math.min(100,G.happy+0.2);
    if(G.placed.some(p=>p.id==='lamp'))      G.rep=Math.min(100,G.rep+0.008);
    if(G.placed.some(p=>p.id==='sofa'))      G.happy=Math.min(100,G.happy+0.1);
    if(G.placed.some(p=>p.id==='beanbag'))   G.energy=Math.min(100,G.energy+0.05);
    if(G.placed.some(p=>p.id==='tv'))        G.happy=Math.min(100,G.happy+0.15);

    // High drug effects
    if(G.drug>50){ G.happy=Math.min(100,G.happy+0.5); G.hp=Math.max(0,G.hp-0.3); }
    if(G.drug>80){ G.chaos+=0.5; G.hp=Math.max(0,G.hp-0.8); }

    // Bad stats hurt HP
    if(G.hunger<15) G.hp=Math.max(0,G.hp-1);
    if(G.sleep<15)  G.hp=Math.max(0,G.hp-0.5);
    if(G.trash>80)  G.hp=Math.max(0,G.hp-0.3);
    if(G.chaos>75)  G.hp=Math.max(0,G.hp-0.5);

    updateHUD();
  }

  if(G.time>=1){G.time=0;endDay();}
  if(G.hp<=0) triggerGameOver('Tu salud llegó a cero. La nave te venció. 💀');
}

function endDay(){
  G.day++;
  G.money-=12;
  G.trash=Math.min(100,G.trash+3);

  // Friends daily effects
  G.friends.forEach(f=>{
    const def=FRIEND_DEFS.find(d=>d.id===f.id);
    if(!def) return;
    Math.random()<0.4 ? def.goodFn(G) : (Math.random()<0.25 ? def.badFn(G) : null);
  });

  // Alquiler mensual
  if(G.day%30===0){
    triggerEvent({
      ico:'👴',tit:'FIN DE MES',dsc:`Han pasado 30 días. Casero quiere 400€. Tienes ${G.money}€.`,
      choices:[
        {lbl:'Pagar 400€',cls:'p',fn:g=>{if(g.money>=400){g.money-=400;notify('Casero','Pagado. Hasta el mes que viene.','g');}else triggerGameOver('Sin dinero para el alquiler. Desahucio. 👴');}},
      ]
    });
    return;
  }

  // Level up
  if(G.xp>=G.level*200){G.level++;G.xp=0;notify('Sistema',`🆙 NIVEL ${G.level}! Nuevas cosas desbloqueadas.`,'g');}

  // Random events
  for(const ev of EVENTS) if(Math.random()<ev.chance){triggerEvent(ev);return;}

  notify('','☀️ Día '+G.day+' — '+G.money+'€ | '+G.seg+' segs');
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,CW,CH);

  // BG
  ctx.fillStyle='#07070f'; ctx.fillRect(0,0,CW,CH);

  drawRoom();

  // Painter's sort
  const items=[
    ...G.placed.map(it=>{
      const def=SHOP_ITEMS.find(d=>d.id===it.id);
      return {key:it.gy+(def?.h||1)+it.gx+(def?.w||1)*0.1, type:'furniture', it, def};
    }),
    {key:G.player.gy+G.player.gx*0.01, type:'player'},
    ...G.friends.map((f,i)=>({key:f.gy+f.gx*0.01+0.001*i, type:'friend', f, i})),
  ];
  items.sort((a,b)=>a.key-b.key);

  items.forEach(r=>{
    if(r.type==='furniture'){
      const fn=FURNITURE_DRAW[r.it.id];
      if(fn) fn(r.it.gx, r.it.gy, G);
      else isoBox(r.it.gx,r.it.gy,r.def?.w||1,r.def?.h||1,0.8,'#333','#222','#111');
    } else if(r.type==='player'){
      drawChar(G.player, 0, true);
    } else {
      drawChar(r.f, r.i+1, false);
    }
  });

  // Party effects
  if(G.isParty) drawParticles();

  // Night overlay
  const t=G.time;
  const na=t>0.72?(t-0.72)*2.5*0.4:t<0.12?(0.12-t)*8*0.4:0;
  if(na>0){ctx.fillStyle=`rgba(0,0,20,${Math.min(na,0.4)})`;ctx.fillRect(0,0,CW,CH);}

  // Drug vision effect
  if(G.drug>60){
    const da=(G.drug-60)/40*0.15;
    ctx.fillStyle=`rgba(191,95,255,${da})`;
    ctx.fillRect(0,0,CW,CH);
  }
}

// ── ROOM ───────────────────────────────────────────────
function drawRoom(){
  // Floor tiles
  for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++) drawTile(x,y);
  // Left wall
  for(let y=0;y<GRID;y++) drawWallL(0,y);
  // Back wall
  for(let x=0;x<GRID;x++) drawWallB(x,0);
  // Wall caps
  drawWallCap(0,0);
  for(let y=1;y<GRID;y++) drawWallCapL(0,y);
  for(let x=1;x<GRID;x++) drawWallCapB(x,0);
  // Corner edge
  const sc=iso(0,0);
  ctx.beginPath();ctx.moveTo(sc.x,sc.y);ctx.lineTo(sc.x,sc.y-WH);
  ctx.strokeStyle='#c8b898';ctx.lineWidth=1.5;ctx.stroke();
  // Wall details
  drawWindows(); drawDoor(); drawGraffiti(); drawNaveSign();
}

function drawTile(gx,gy){
  const s=iso(gx,gy);
  const alt=(gx+gy)%2===0;
  ctx.beginPath();
  ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+TW/2,s.y+TH/2);
  ctx.lineTo(s.x,s.y+TH); ctx.lineTo(s.x-TW/2,s.y+TH/2);
  ctx.closePath();
  ctx.fillStyle=alt?'#e8dcc8':'#dfd0b8';ctx.fill();
  ctx.strokeStyle='rgba(160,130,90,.1)';ctx.lineWidth=0.4;ctx.stroke();
  if(gx%2===0){
    ctx.beginPath();ctx.moveTo(s.x-TW/2,s.y+TH/2);ctx.lineTo(s.x+TW/2,s.y+TH/2);
    ctx.strokeStyle='rgba(140,110,70,.08)';ctx.lineWidth=0.4;ctx.stroke();
  }
}

function drawWallB(gx,gy){
  const s=iso(gx,gy);
  ctx.beginPath();
  ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+TW/2,s.y+TH/2);
  ctx.lineTo(s.x+TW/2,s.y+TH/2-WH); ctx.lineTo(s.x,s.y-WH);
  ctx.closePath();
  ctx.fillStyle='#f0ece2';ctx.fill();
  ctx.strokeStyle='rgba(100,90,70,.06)';ctx.lineWidth=0.4;ctx.stroke();
  // Skirting
  ctx.beginPath();
  ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+TW/2,s.y+TH/2);
  ctx.lineTo(s.x+TW/2,s.y+TH/2-5); ctx.lineTo(s.x,s.y-5);
  ctx.closePath();ctx.fillStyle='#c8b898';ctx.fill();
}

function drawWallL(gx,gy){
  const s=iso(gx,gy);
  ctx.beginPath();
  ctx.moveTo(s.x-TW/2,s.y+TH/2); ctx.lineTo(s.x,s.y);
  ctx.lineTo(s.x,s.y-WH); ctx.lineTo(s.x-TW/2,s.y+TH/2-WH);
  ctx.closePath();ctx.fillStyle='#e0dcd0';ctx.fill();
  ctx.strokeStyle='rgba(100,90,70,.06)';ctx.lineWidth=0.4;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s.x-TW/2,s.y+TH/2); ctx.lineTo(s.x,s.y);
  ctx.lineTo(s.x,s.y-5); ctx.lineTo(s.x-TW/2,s.y+TH/2-5);
  ctx.closePath();ctx.fillStyle='#b8a888';ctx.fill();
}

function drawWallCap(gx,gy){
  const s=iso(gx,gy); const ty=s.y-WH;
  ctx.beginPath();
  ctx.moveTo(s.x,ty); ctx.lineTo(s.x+TW/2,ty+TH/2);
  ctx.lineTo(s.x,ty+TH); ctx.lineTo(s.x-TW/2,ty+TH/2);
  ctx.closePath();ctx.fillStyle='#faf8f4';ctx.fill();
  ctx.strokeStyle='rgba(100,90,70,.12)';ctx.lineWidth=0.4;ctx.stroke();
}
function drawWallCapL(gx,gy){
  const s=iso(gx,gy); const ty=s.y-WH;
  ctx.beginPath();
  ctx.moveTo(s.x-TW/2,ty+TH/2); ctx.lineTo(s.x,ty);
  ctx.lineTo(s.x,ty+TH); ctx.lineTo(s.x-TW/2,ty+TH*1.5);
  ctx.closePath();ctx.fillStyle='#e8e4d8';ctx.fill();
}
function drawWallCapB(gx,gy){
  const s=iso(gx,gy); const ty=s.y-WH;
  ctx.beginPath();
  ctx.moveTo(s.x,ty); ctx.lineTo(s.x+TW/2,ty+TH/2);
  ctx.lineTo(s.x+TW/2,ty+TH*1.5); ctx.lineTo(s.x,ty+TH);
  ctx.closePath();ctx.fillStyle='#ddd8cc';ctx.fill();
}

function drawWindows(){
  [[3,0],[6,0]].forEach(([x,y])=>{
    const s=iso(x,y);
    const wx=s.x+4,wy=s.y-WH+10,ww=TW/2-6,wh=WH*0.52;
    ctx.fillStyle='#b8a878';ctx.fillRect(wx,wy,ww,wh);
    ctx.fillStyle='rgba(120,190,255,.22)';ctx.fillRect(wx+2,wy+2,ww-4,wh-4);
    ctx.fillStyle='rgba(200,230,255,.3)';ctx.fillRect(wx+2,wy+2,3,wh-4);
    ctx.fillStyle='#b8a878';
    ctx.fillRect(wx+2,wy+wh/2-0.5,ww-4,1);
    ctx.fillRect(wx+ww/2-1,wy+2,1,wh-4);
    ctx.fillStyle='#d4c898';ctx.fillRect(wx-1,wy+wh,ww+2,3);
  });
}

function drawDoor(){
  const s=iso(0,6);
  const dh=WH*0.78,dw=TW/2-4;
  ctx.fillStyle='#b8a878';ctx.fillRect(s.x-TW/2+4,s.y+TH/2-dh-2,dw,dh+2);
  ctx.fillStyle='#d4c090';ctx.fillRect(s.x-TW/2+6,s.y+TH/2-dh,dw-4,dh);
  ctx.fillStyle='#c8b080';
  ctx.fillRect(s.x-TW/2+8,s.y+TH/2-dh+4,dw-14,dh/2-6);
  ctx.fillRect(s.x-TW/2+8,s.y+TH/2-dh/2+2,dw-14,dh/2-6);
  ctx.fillStyle='#ffd600';ctx.beginPath();
  ctx.arc(s.x-TW/2+dw-5,s.y+TH/2-dh/2,2.5,0,Math.PI*2);ctx.fill();
}

function drawGraffiti(){
  const s=iso(0,3);
  ctx.save();ctx.globalAlpha=0.55;
  ctx.strokeStyle='#ff2d78';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(s.x-TW/2+10,s.y-WH+22,8,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#00f5ff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(s.x-TW/2+3,s.y-WH+34);ctx.lineTo(s.x-TW/2+22,s.y-WH+34);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s.x-TW/2+6,s.y-WH+38);ctx.lineTo(s.x-TW/2+18,s.y-WH+38);ctx.stroke();
  ctx.restore();
}

function drawNaveSign(){
  const s=iso(2,0);
  ctx.fillStyle='#111';ctx.fillRect(s.x+4,s.y-WH+8,32,14);
  ctx.fillStyle='#aaff00';ctx.font='bold 7px monospace';ctx.fillText('NAVE 7',s.x+7,s.y-WH+19);
}

// ── CHARACTERS ─────────────────────────────────────────
const CHAR_PALETTES=[
  {skin:'#f5cba7',hair:'#2c1810',shirt:'#ff2d78',pants:'#1a1a3a',shoe:'#111',acc:'cap'},
  {skin:'#d4a574',hair:'#4a2810',shirt:'#00f5ff',pants:'#0a1a30',shoe:'#081018',acc:'none'},
  {skin:'#e8c49a',hair:'#1a1a1a',shirt:'#aaff00',pants:'#0a1a0a',shoe:'#081008',acc:'glasses'},
  {skin:'#c8935a',hair:'#3a1808',shirt:'#ffd600',pants:'#1a1000',shoe:'#100800',acc:'none'},
  {skin:'#f0d4b0',hair:'#0a0a18',shirt:'#bf5fff',pants:'#0a0018',shoe:'#080010',acc:'none'},
  {skin:'#dca070',hair:'#1a0a00',shirt:'#ff6b00',pants:'#1a0800',shoe:'#100600',acc:'none'},
  {skin:'#e8b890',hair:'#3a3010',shirt:'#ff2d78',pants:'#1a0018',shoe:'#0a0010',acc:'none'},
  {skin:'#c07850',hair:'#2a1800',shirt:'#00f5ff',pants:'#001020',shoe:'#001018',acc:'none'},
];

function drawChar(ch, paletteIdx, isPlayer){
  const pal=CHAR_PALETTES[paletteIdx%CHAR_PALETTES.length];
  const s=iso(ch.gx,ch.gy);
  const x=s.x, y=s.y;
  const walking=ch.state==='walking';
  const partying=ch.state==='partying';
  const sleeping=ch.state==='sleeping';
  const ko=ch.state==='ko';
  const t=Date.now()/160;
  const leg=walking?Math.sin(t)*4:0;
  const arm=walking?Math.sin(t+Math.PI)*3:0;
  const bob=partying?Math.sin(t*2.2)*2.5:0;
  const flip=ch.facing==='left';

  ctx.save();
  if(flip){ctx.transform(-1,0,0,1,CW*2,0);}
  const rx=flip?CW*2-x:x;

  if(ko){
    // Lying down
    ctx.fillStyle=pal.pants;  ctx.fillRect(rx-7,y+2,14,4);
    ctx.fillStyle=pal.shirt;  ctx.fillRect(rx-4,y-1,9,4);
    ctx.fillStyle=pal.skin;   ctx.fillRect(rx+5,y-4,7,5);
    ctx.fillStyle=pal.hair;   ctx.fillRect(rx+5,y-5,7,3);
    ctx.fillStyle=pal.shoe;   ctx.fillRect(rx-8,y+4,4,2);ctx.fillRect(rx-2,y+4,4,2);
    ctx.fillStyle='#aaaaff';ctx.font='bold 7px monospace';ctx.fillText('z z',rx+9,y-5);
    ctx.restore();return;
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.beginPath();ctx.ellipse(rx,y+8+bob,8,3,0,0,Math.PI*2);ctx.fill();

  // Shoes
  ctx.fillStyle=pal.shoe;
  ctx.fillRect(rx-6+leg,y+7+bob,5,3);
  ctx.fillRect(rx+2-leg,y+7+bob,5,3);
  // Shoe soles
  ctx.fillStyle='rgba(255,255,255,.06)';
  ctx.fillRect(rx-6+leg,y+9+bob,5,1);ctx.fillRect(rx+2-leg,y+9+bob,5,1);

  // Legs
  ctx.fillStyle=pal.pants;
  ctx.fillRect(rx-5+leg,y-1+bob,4,9);
  ctx.fillRect(rx+2-leg,y-1+bob,4,9);
  // Pant crease
  ctx.fillStyle='rgba(0,0,0,.08)';
  ctx.fillRect(rx-4+leg,y-1+bob,1,9);ctx.fillRect(rx+3-leg,y-1+bob,1,9);

  // Body
  ctx.fillStyle=pal.shirt;
  ctx.fillRect(rx-5,y-10+bob,11,9);
  // Shirt detail
  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.fillRect(rx-4,y-10+bob,1,9);
  ctx.fillStyle='rgba(0,0,0,.1)';
  ctx.fillRect(rx+4,y-10+bob,1,9);

  // Arms
  ctx.fillStyle=pal.skin;
  if(partying){
    ctx.fillRect(rx-9,y-14+bob+arm,3,7);
    ctx.fillRect(rx+6,y-14+bob-arm,3,7);
    // Hands raised
    ctx.fillStyle=pal.skin;
    ctx.fillRect(rx-9,y-20+bob+arm,3,3);
    ctx.fillRect(rx+6,y-20+bob-arm,3,3);
  } else if(sleeping){
    ctx.fillRect(rx-6,y-7+bob,13,3);
  } else {
    ctx.fillRect(rx-9,y-9+bob+arm,3,8);
    ctx.fillRect(rx+6,y-9+bob-arm,3,8);
  }

  // Neck
  ctx.fillStyle=pal.skin;ctx.fillRect(rx-1,y-12+bob,3,3);

  // Head
  ctx.fillStyle=pal.skin;ctx.fillRect(rx-4,y-19+bob,9,8);
  // Head highlight
  ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(rx-4,y-19+bob,2,8);

  // Hair
  ctx.fillStyle=pal.hair;
  ctx.fillRect(rx-4,y-19+bob,9,3);
  ctx.fillRect(rx-5,y-18+bob,2,4);
  ctx.fillRect(rx+4,y-18+bob,2,4);

  // Eyes
  if(!sleeping&&!ko){
    ctx.fillStyle='#fff';
    ctx.fillRect(rx-3,y-14+bob,3,2);ctx.fillRect(rx+1,y-14+bob,3,2);
    ctx.fillStyle='#1a1a1a';
    ctx.fillRect(rx-2,y-14+bob,2,2);ctx.fillRect(rx+1,y-14+bob,2,2);
    // Pupil shine
    ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.fillRect(rx-2,y-14+bob,1,1);ctx.fillRect(rx+2,y-14+bob,1,1);
    // Mouth
    if(partying||G.isParty){
      ctx.fillStyle='#cc4420';ctx.fillRect(rx-2,y-12+bob,5,1.5);
    } else if(G.drug>50){
      ctx.fillStyle='#9b59b6';ctx.fillRect(rx-1,y-12+bob,3,1);
    } else {
      ctx.fillStyle='#aa5533';ctx.fillRect(rx-1,y-12+bob,3,1);
    }
  } else {
    ctx.fillStyle='#1a1a1a';
    ctx.fillRect(rx-3,y-13+bob,3,1);ctx.fillRect(rx+1,y-13+bob,3,1);
  }

  // Accessories
  if(pal.acc==='cap'||paletteIdx===0){
    ctx.fillStyle='#ff6b00';
    ctx.fillRect(rx-5,y-20+bob,10,2);
    ctx.fillRect(rx-6,y-19+bob,2,2);
    ctx.fillStyle='#cc4400';ctx.fillRect(rx-5,y-20+bob,1,2);
  }
  if(pal.acc==='glasses'||paletteIdx===2){
    ctx.fillStyle='rgba(0,0,0,.7)';
    ctx.fillRect(rx-3,y-15+bob,3,2);ctx.fillRect(rx+1,y-15+bob,3,2);
    ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(rx,y-14+bob);ctx.lineTo(rx+1,y-14+bob);ctx.stroke();
  }

  // Drug glow eyes
  if(G.drug>70&&isPlayer){
    ctx.fillStyle='rgba(191,95,255,.5)';
    ctx.fillRect(rx-3,y-14+bob,3,2);ctx.fillRect(rx+1,y-14+bob,3,2);
  }

  // Selection ring (player)
  if(isPlayer){
    ctx.strokeStyle='rgba(255,45,120,.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(rx,y+8+bob,10,4,0,0,Math.PI*2);ctx.stroke();
    // Player arrow
    ctx.fillStyle='#ff2d78';ctx.beginPath();
    ctx.moveTo(rx-3,y-22+bob);ctx.lineTo(rx+3,y-22+bob);ctx.lineTo(rx,y-18+bob);
    ctx.closePath();ctx.fill();
  }

  // Bubble
  if(ch.bubble){
    const bx=rx+11,by=y-22+bob;
    const bw=Math.max(30,ch.bubble.length*5+8);
    ctx.fillStyle='rgba(15,15,28,.95)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,13,4);ctx.fill();
    ctx.strokeStyle=isPlayer?'#ff2d78':'#00f5ff';ctx.lineWidth=0.8;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 6px monospace';
    ctx.fillText(ch.bubble.slice(0,12),bx+3,by+9);
    // Tail
    ctx.fillStyle='rgba(15,15,28,.95)';
    ctx.beginPath();ctx.moveTo(bx,by+13);ctx.lineTo(bx-5,by+18);ctx.lineTo(bx+5,by+13);ctx.closePath();ctx.fill();
  }

  ctx.restore();
}

// Party particles
let particles=[];
function drawParticles(){
  if(Math.random()<0.3) particles.push({x:Math.random()*CW,y:CH*0.6,vx:(Math.random()-0.5)*2,vy:-2-Math.random()*2,life:1,col:['#ff2d78','#00f5ff','#aaff00','#ffd600','#bf5fff'][Math.floor(Math.random()*5)]});
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life-=0.02;
    ctx.fillStyle=p.col;ctx.globalAlpha=p.life;
    ctx.fillRect(p.x,p.y,3,3);
    ctx.globalAlpha=1;
  });
}

let radialOpen=false;

function showRadial(cx2,cy2,title,btns){
  const rad=document.getElementById('radial');
  const bg=document.getElementById('rad-bg');
  const tit=document.getElementById('rad-title');
  const R=70;
  bg.style.width=bg.style.height=(R*2+20)+'px';
  bg.style.left=(cx2-R-10)+'px'; bg.style.top=(cy2-R-10)+'px';
  tit.style.left=cx2+'px'; tit.style.top=(cy2-8)+'px';
  tit.textContent=title;
  // Remove old btns
  rad.querySelectorAll('.rad-btn').forEach(b=>b.remove());
  btns.forEach((btn,i)=>{
    const angle=(i/btns.length)*Math.PI*2-Math.PI/2;
    const bx=cx2+R*Math.cos(angle), by=cy2+R*Math.sin(angle);
    const el=document.createElement('div');
    el.className='rad-btn '+(btn.cls||'');
    el.style.left=bx+'px'; el.style.top=by+'px';
    el.innerHTML=`<span>${btn.ico}</span><span class="rl">${btn.lbl}</span>`;
    el.onclick=(e)=>{e.stopPropagation();btn.fn();closeRadial();};
    rad.appendChild(el);
  });
  rad.classList.add('on');
  radialOpen=true;
}

function closeRadial(){
  document.getElementById('radial').classList.remove('on');

}

cv.addEventListener('click',e=>{
  if(radialOpen){closeRadial();return;}
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const {gx,gy}=screenToGrid(mx,my);

  // Check furniture
  for(const it of G.placed){
    const def=SHOP_ITEMS.find(d=>d.id===it.id);
    if(!def) continue;
    if(gx>=it.gx&&gx<it.gx+def.w&&gy>=it.gy&&gy<it.gy+def.h){
      openFurnitureRadial(it,def,mx,my); return;
    }
  }
  // Check friends
  for(const f of G.friends){
    if(Math.abs(f.gx-gx)<1&&Math.abs(f.gy-gy)<1){
      openFriendRadial(f,mx,my); return;
    }
  }
  // Move
  if(gx>=0&&gx<GRID&&gy>=0&&gy<GRID){
    G.player.tx=Math.max(0.5,Math.min(GRID-1.5,gx+0.5));
    G.player.ty=Math.max(0.5,Math.min(GRID-1.5,gy+0.5));
  }
});

function doWork(id){
  if(G.energy<8){notify('','Demasiado cansado para trabajar.','r');return;}
  const w=WORKS.find(x=>x.id===id);if(!w)return;

  if(id==='nada'){G.energy=Math.min(100,G.energy+25);G.sleep=Math.min(100,G.sleep+15);G.player.state='sleeping';G.player.bubble='ZZZ';G.player.bubbleT=4;setTimeout(()=>{if(G.player.state==='sleeping'){G.player.state='idle';G.player.bubble=null;}},4000);notify('','No has hecho nada. Necesario a veces 🛌','b');return;}
  if(id==='limpiar'){G.trash=Math.max(0,G.trash-35);G.energy=Math.max(0,G.energy-20);G.rep=Math.min(100,G.rep+5);G.player.bubble='🧹';G.player.bubbleT=2;notify('','Nave más limpia. -35% basura 🧹','g');G.xp+=15;return;}
  if(id==='chatear'){const e=rnd(w.money),s=rnd(w.seg);G.money+=e;G.seg+=s;G.energy=Math.max(0,G.energy-w.energy);G.player.bubble='📱';G.player.bubbleT=2;notify('','Chateando: +'+s+' segs, +'+e+'€ 📱','b');G.xp+=5;return;}
  if(id==='rebuscar'){const e=rnd(w.money);G.money+=e;G.energy=Math.max(0,G.energy-w.energy);notify('','Rebuscando: +'+e+'€ 🧾','y');G.xp+=5;return;}
  if(id==='salir'){const e=rnd(w.money),s=rnd(w.seg);G.money+=e;G.seg+=s;G.energy=Math.max(0,G.energy-w.energy);const r=Math.random();if(r<0.1){G.hp=Math.max(0,G.hp-10);notify('','Has salido y alguien se ha metido contigo. -10 HP','r');}else if(r<0.3){G.rep=Math.min(100,G.rep+10);notify('','Buenas relaciones en el barrio. +rep 🤝','g');}else{notify('','Salida al barrio: +'+s+' segs, '+e+'€ 🚶','b');}G.xp+=10;return;}

  const skill=G.skills[id]||0;
  const bonus=1+skill*0.12;
  const earned=Math.floor(rnd(w.money)*bonus);
  const segG=Math.floor(rnd(w.seg)*bonus);
  G.money+=earned; G.seg+=segG;
  G.energy=Math.max(0,G.energy-w.energy);
  G.hunger=Math.max(0,G.hunger-8);
  G.skills[id]=Math.min(10,(G.skills[id]||0)+1);
  G.xp+=30;
  G.player.state='working';G.player.bubble=w.ico;G.player.bubbleT=3;
  setTimeout(()=>{if(G.player.state==='working'){G.player.state='idle';G.player.bubble=null;}},3000);

  const failChance=Math.max(0.04,0.3-skill*0.026);
  if(Math.random()<failChance){notify('',`${w.ico} ${w.name}: algo salió raro. +${earned}€, +${segG} segs. (skill ${G.skills[id]}/10)`,'r');}
  else{notify('',`${w.ico} ${w.name}: ¡bien! +${earned}€, +${segG} segs 🔥`,'g');}
  updateHUD();
}

function rnd([a,b]){return Math.floor(Math.random()*(b-a+1))+a;}

function takeDrug(id){
  const sub=SUBSTANCES.find(s=>s.id===id);if(!sub)return;
  if(G.money<sub.price){notify('El Seco','Sin pasta, tío 💸','r');return;}
  G.money-=sub.price;
  G.drug=Math.min(100,G.drug+sub.drugEffect);
  G.happy=Math.min(100,G.happy+sub.happyEffect);
  G.hp=Math.max(0,G.hp-sub.healthCost);
  G.energy=Math.max(0,Math.min(100,G.energy-(sub.energyCost||0)));
  G.addiction[sub.id]=(G.addiction[sub.id]||0)+1;
  G.player.bubble=sub.ico+'!!';G.player.bubbleT=3;

  // Addiction effects
  const addCount=G.addiction[sub.id];
  if(addCount>5&&Math.random()<sub.addictChance*2){
    notify(sub.name,'Estás desarrollando tolerancia. Necesitas más para sentir lo mismo.','r');
  }
  if(addCount>10){notify('Sistema','⚠️ Nivel de adicción alto. Cuidado.','r');}

  // Drug-specific effects
  if(id==='keta')  { notify('','El agujero K... todo se distorsiona 🌀','p'); G.chaos+=10; }
  if(id==='mdma')  { G.friends.forEach(f=>{f.bubble='❤️';f.bubbleT=5;}); notify('','MDMA: quieres a todo el mundo. Por ahora.','p'); }
  if(id==='speed') { G.energy=Math.min(100,G.energy+50); notify('','Speed: energía infinita... durante un rato ⚡','p'); }
  if(id==='porro') { G.player.state='sleeping'; setTimeout(()=>{if(G.player.state==='sleeping')G.player.state='idle';},6000); }

  notify('El Seco',`${sub.ico} ${sub.name} tomado. Salud -${sub.healthCost}.`,id==='birra'||id==='litrona'?'b':'p');
  updateHUD();
  openDrug(); // refresh
}

    <div class="scard-fx">${it.fx}</div>

  });

function buyItem(it){
  if(G.money<it.price){notify('','Sin dinero 💸','r');return;}
  if(G.placed.some(p=>p.id===it.id)){notify('','Ya está en la nave.');return;}
  G.money-=it.price;
  // Auto-place finding free spot
  let px=1,py=1;
  outer:for(let y=1;y<GRID-it.h;y++){
    for(let x=1;x<GRID-it.w;x++){
      const blocked=G.placed.some(p=>{
        const def=SHOP_ITEMS.find(d=>d.id===p.id);
        return x<p.gx+(def?.w||1)&&x+it.w>p.gx&&y<p.gy+(def?.h||1)&&y+it.h>p.gy;
      });
      if(!blocked){px=x;py=y;break outer;}
    }
  }
  G.placed.push({id:it.id,gx:px,gy:py});
  notify('Tienda',it.name+' colocado en la nave! '+it.fx,'g');
  renderShopGrid();updateHUD();
}

// ═══════════════════════════════════════════════════════
function openStats(){
  document.getElementById('stp-lvl').textContent=G.level;
  const xpn=G.level*200;
  const body=document.getElementById('stp-body');
  const bar=(lbl,val,max,col)=>`<div class="sr"><span class="sl">${lbl}</span><div class="st"><div class="sf" style="width:${Math.min(100,val/max*100)}%;background:${col}"></div></div><span class="sv" style="color:${col}">${Math.round(val)}</span></div>`;
  body.innerHTML=`
  <div class="ss"><div class="ss-title">Progreso</div>
    <div class="xpr"><span>XP</span><span>${G.xp}/${xpn}</span></div>
    <div class="xpt"><div class="xpf" style="width:${Math.min(100,G.xp/xpn*100)}%"></div></div>
    <div class="xpr"><span>💶 Dinero</span><span style="color:var(--gn)">${G.money}€</span></div>
    <div class="xpr"><span>⭐ Seguidores</span><span style="color:var(--ye)">${G.seg}</span></div>
    <div class="xpr"><span>🏆 Reputación</span><span style="color:var(--cy)">${Math.round(G.rep)}</span></div>
  </div>
  <div class="ss"><div class="ss-title">Estado</div>
    ${bar('❤️ Salud',G.hp,100,'#ff2d78')}
    ${bar('⚡ Energía',G.energy,100,'#ffd600')}
    ${bar('🍔 Hambre',G.hunger,100,'#ff6b00')}
    ${bar('😴 Sueño',G.sleep,100,'#00f5ff')}
    ${bar('😊 Feliz',G.happy,100,'#aaff00')}
    ${bar('🌀 Drogas',G.drug,100,'#bf5fff')}
    ${bar('🗑️ Basura',G.trash,100,G.trash>60?'#ff3333':'#888')}
    ${bar('🔥 Caos',G.chaos,100,G.chaos>50?'#ff3333':'#888')}
  </div>
  <div class="ss"><div class="ss-title">Habilidades</div>
    ${Object.entries(G.skills).map(([k,v])=>bar({'cantar':'🎤 Cantar','tatuar':'💉 Tatuar','fotos':'📷 Fotos','stream':'🎮 Stream'}[k]||k,v,10,'var(--cy)')).join('')}
  </div>
  <div class="ss"><div class="ss-title">La Nave</div>
    <div class="xpr"><span>🛋️ Muebles</span><span>${G.placed.length}/${SHOP_ITEMS.length}</span></div>
    <div class="xpr"><span>👥 Amigos</span><span>${G.friends.length}/15</span></div>
    ${Object.entries(G.addiction).filter(([,v])=>v>0).map(([k,v])=>`<div class="xpr"><span>${SUBSTANCES.find(s=>s.id===k)?.ico||'💊'} ${k}</span><span style="color:var(--pk)">${v}x</span></div>`).join('')}
  </div>`;
  document.getElementById('stpanel').classList.add('on');
}
function closeStats(){document.getElementById('stpanel').classList.remove('on');}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
function triggerEvent(ev){
  G.running=false;
  document.getElementById('ev-ico').textContent=ev.ico;
  document.getElementById('ev-tit').textContent=ev.tit;
  document.getElementById('ev-tit').className='ev-tit'+(ev.tit_cls?' '+ev.tit_cls:'');
  document.getElementById('evbox').className='evbox'+(ev.evbox_cls?' '+ev.evbox_cls:'');
  document.getElementById('ev-dsc').textContent=ev.dsc;
  const btns=document.getElementById('ev-btns');btns.innerHTML='';
  ev.choices.forEach(ch=>{
    const b=document.createElement('button');
    b.className='ev-btn '+ch.cls;b.textContent=ch.lbl;
    b.onclick=()=>{ch.fn(G);document.getElementById('evlay').classList.remove('on');G.running=true;updateHUD();};
    btns.appendChild(b);
  });
  document.getElementById('evlay').classList.add('on');
}
function triggerGameOver(reason){
  G.gameover=true;G.running=false;
  triggerEvent({ico:'💀',tit:'GAME OVER',dsc:reason,tit_cls:'rd',evbox_cls:'rd',
    choices:[{lbl:'VOLVER A EMPEZAR',cls:'p',fn:()=>initGame()}]});
}

// ═══════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════
function updateHUD(){
  if(!G)return;
  document.getElementById('hp-m').textContent=G.money;
  document.getElementById('hp-s').textContent=G.seg>=1000?(G.seg/1000).toFixed(1)+'k':G.seg;
  document.getElementById('hp-hp').textContent=Math.round(G.hp);
  document.getElementById('hp-dr').textContent=Math.round(G.drug);
  // Status bars
  const sb=(id,val)=>{const el=document.getElementById('sb-'+id);if(el)el.style.width=Math.max(0,Math.min(100,val))+'%';};
  sb('hunger',G.hunger); sb('sleep',G.sleep); sb('energy',G.energy);
  sb('happy',G.happy);   sb('trash',G.trash); sb('drug',G.drug);
  // Pill colors
  const pm=document.getElementById('hp-m').parentElement;
  pm.className='pill'+(G.money<50?' pk':G.money<200?' ye':' gn');
  const ph=document.getElementById('hp-hp').parentElement;
  ph.className='pill'+(G.hp<30?' pk':G.hp<60?' ye':' cy');
}

// ═══════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════
function notify(sender,msg,type=''){
  const area=document.getElementById('nbox');
  // Limit to 4 visible
  while(area.children.length>=4) area.removeChild(area.firstChild);
  const el=document.createElement('div');
  el.className='notif '+type;
  el.innerHTML=(sender?`<div class="nsend">${sender}</div>`:'')+msg;
  area.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .4s';el.style.opacity='0';setTimeout(()=>el.remove(),400);},3000);
}

function closeAllPanels(){
  ['shop','fpanel','stpanel','drugpanel'].forEach(id=>document.getElementById(id).classList.remove('on'));
  closeRadial();
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
window.addEventListener('resize',()=>{resize();});
resize();
initGame();
</script>
