<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>El Local – Mejorada del Campo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --bg:#0a0a12;--s1:#11111e;--s2:#181828;--s3:#20203a;--bd:#2a2a4a;
  --pk:#ff2d78;--cy:#00f5ff;--gn:#aaff00;--ye:#ffd600;--pu:#bf5fff;--or:#ff6b00;
  --tx:#ffffff;--mu:#8888aa;
  --ff:'Space Mono',monospace;--fh:'Bebas Neue',cursive;
}
html,body{width:100%;height:100dvh;background:var(--bg);color:var(--tx);font-family:var(--ff);overflow:hidden;user-select:none;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 4px;background:var(--s1);border-bottom:2px solid var(--pk);flex-shrink:0;}
#hdr-left h1{font-family:var(--fh);font-size:22px;letter-spacing:3px;color:var(--pk);line-height:1;text-shadow:0 0 20px var(--pk);}
#hdr-left .sub{font-size:7px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;}
#hdr-right{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.pill{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;border:1px solid var(--bd);font-size:9px;font-weight:700;background:var(--s2);}
.pill.gn{border-color:var(--gn);color:var(--gn);}
.pill.pk{border-color:var(--pk);color:var(--pk);}
.pill.cy{border-color:var(--cy);color:var(--cy);}
.pill.ye{border-color:var(--ye);color:var(--ye);}
.pill.pu{border-color:var(--pu);color:var(--pu);}

/* ── DAY BAR ── */
#daybar{height:3px;background:var(--s2);flex-shrink:0;}
#dayfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--cy));transition:width .8s linear;}

/* ── SCENE ── */
#scene{flex:1;position:relative;overflow:hidden;background:var(--bg);}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}

/* ── NOTIFICATIONS ── */
#nbox{position:absolute;top:6px;left:8px;right:8px;z-index:20;pointer-events:none;}
.notif{background:rgba(17,17,30,0.97);border-left:3px solid var(--pk);padding:5px 9px 5px 8px;margin-bottom:4px;border-radius:0 7px 7px 0;font-size:9px;line-height:1.5;animation:nin .2s ease-out;}
.notif.g{border-color:var(--gn);}
.notif.b{border-color:var(--cy);}
.notif.y{border-color:var(--ye);}
.notif.p{border-color:var(--pu);}
.nsend{font-size:7px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
@keyframes nin{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

/* ── ACTION MENU (tap on character or tile) ── */
#amenu{position:absolute;z-index:30;display:none;flex-direction:column;gap:4px;background:var(--s1);border:2px solid var(--pk);border-radius:10px;padding:8px;min-width:130px;box-shadow:0 0 20px rgba(255,45,120,0.3);}
#amenu.on{display:flex;}
#amenu-title{font-family:var(--fh);font-size:16px;color:var(--pk);letter-spacing:1px;margin-bottom:2px;}
.am-btn{padding:6px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;font-size:9px;cursor:pointer;transition:background .1s,border-color .1s;text-align:left;}
.am-btn:active{background:var(--s3);}
.am-btn.red{border-color:var(--pk);color:var(--pk);}
.am-btn.grn{border-color:var(--gn);color:var(--gn);}
.am-btn.blu{border-color:var(--cy);color:var(--cy);}
.am-btn.yel{border-color:var(--ye);color:var(--ye);}
.am-btn.pur{border-color:var(--pu);color:var(--pu);}
.am-close{font-size:8px;color:var(--mu);text-align:center;cursor:pointer;margin-top:2px;}

/* ── SHOP PANEL ── */
#shop{position:absolute;inset:0;background:rgba(10,10,18,0.98);z-index:40;display:none;flex-direction:column;}
#shop.on{display:flex;}
#shop-hdr{padding:10px 14px 7px;border-bottom:2px solid var(--cy);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#shop-hdr h2{font-family:var(--fh);font-size:24px;color:var(--cy);letter-spacing:2px;}
#shop-money{font-size:11px;font-weight:700;color:var(--gn);}
#shop-tabs{display:flex;gap:5px;padding:7px 12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#shop-tabs::-webkit-scrollbar{display:none;}
.stab{padding:4px 11px;border-radius:20px;border:1px solid var(--bd);font-size:8px;cursor:pointer;white-space:nowrap;background:var(--s2);transition:all .15s;}
.stab.on{background:var(--cy);color:#000;border-color:var(--cy);font-weight:700;}
#shop-list{flex:1;overflow-y:auto;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.scard{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 7px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .12s,border-color .15s;text-align:center;}
.scard:active{transform:scale(0.94);}
.scard.owned{border-color:var(--gn);opacity:.55;pointer-events:none;}
.scard.can{border-color:var(--pk);}
.scard-ico{font-size:26px;}
.scard-name{font-size:8px;text-transform:uppercase;letter-spacing:.5px;}
.scard-fx{font-size:7px;color:var(--cy);}
.scard-desc{font-size:7px;color:var(--mu);line-height:1.3;}
.scard-price{font-size:10px;font-weight:700;color:var(--gn);}
#shop-close{margin:8px 12px 10px;padding:11px;background:var(--s2);border:1px solid var(--pk);border-radius:8px;font-family:var(--ff);font-size:10px;font-weight:700;color:var(--pk);cursor:pointer;flex-shrink:0;}
#shop-close:active{opacity:.7;}

/* ── EVENT OVERLAY ── */
#evlay{position:absolute;inset:0;background:rgba(10,10,18,0.94);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:22px;}
#evlay.on{display:flex;}
.evbox{background:var(--s1);border:2px solid var(--pk);border-radius:14px;padding:20px 16px;width:100%;text-align:center;}
.evbox.cy{border-color:var(--cy);}
.evbox.gn{border-color:var(--gn);}
.ev-ico{font-size:48px;margin-bottom:8px;}
.ev-tit{font-family:var(--fh);font-size:28px;color:var(--pk);letter-spacing:2px;margin-bottom:5px;}
.ev-tit.cy{color:var(--cy);}
.ev-tit.gn{color:var(--gn);}
.ev-dsc{font-size:10px;color:var(--mu);line-height:1.7;margin-bottom:14px;}
.ev-btns{display:flex;gap:7px;flex-wrap:wrap;}
.ev-btn{flex:1;min-width:80px;padding:11px 6px;border-radius:8px;border:none;font-family:var(--ff);font-size:9px;font-weight:700;cursor:pointer;line-height:1.3;}
.ev-btn:active{opacity:.7;}
.ev-btn.p{background:var(--pk);color:#fff;}
.ev-btn.c{background:var(--cy);color:#000;}
.ev-btn.g{background:var(--gn);color:#000;}
.ev-btn.s{background:var(--s2);color:var(--tx);border:1px solid var(--bd);}
.ev-btn.d{background:#cc0000;color:#fff;}

/* ── BOTTOM BAR ── */
#bot{display:flex;gap:4px;padding:5px 8px 7px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;}
.bbt{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 2px 5px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform .1s;}
.bbt:active{transform:scale(0.9);}
.bbt .bi{font-size:18px;}
.bbt .bl{font-size:6px;color:var(--mu);text-transform:uppercase;letter-spacing:.3px;text-align:center;}
.bbt.hl{border-color:var(--pk);}
.bbt.cy{border-color:var(--cy);}

/* ── FRIENDS PANEL ── */
#fpanel{position:absolute;inset:0;background:rgba(10,10,18,0.98);z-index:40;display:none;flex-direction:column;}
#fpanel.on{display:flex;}
#fp-hdr{padding:10px 14px 7px;border-bottom:2px solid var(--pu);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#fp-hdr h2{font-family:var(--fh);font-size:24px;color:var(--pu);letter-spacing:2px;}
#fp-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.fcard{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.fcard.invited{border-color:var(--gn);}
.fcard-ico{font-size:28px;flex-shrink:0;}
.fcard-info{flex:1;}
.fcard-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.fcard-role{font-size:8px;color:var(--mu);margin-bottom:3px;}
.fcard-traits{display:flex;gap:3px;flex-wrap:wrap;}
.ftrait{font-size:7px;padding:1px 5px;border-radius:10px;border:1px solid var(--bd);}
.ftrait.g{border-color:var(--gn);color:var(--gn);}
.ftrait.r{border-color:var(--pk);color:var(--pk);}
.fcard-btn{padding:6px 10px;border-radius:7px;border:none;font-family:var(--ff);font-size:8px;font-weight:700;cursor:pointer;}
.fcard-btn.inv{background:var(--pu);color:#fff;}
.fcard-btn.kick{background:var(--s3);color:var(--pk);border:1px solid var(--pk);}
#fp-close{margin:8px 12px 10px;padding:11px;background:var(--s2);border:1px solid var(--pu);border-radius:8px;font-family:var(--ff);font-size:10px;font-weight:700;color:var(--pu);cursor:pointer;flex-shrink:0;}

/* ── STATS PANEL ── */
#stpanel{position:absolute;inset:0;background:rgba(10,10,18,0.98);z-index:40;display:none;flex-direction:column;}
#stpanel.on{display:flex;}
#stp-hdr{padding:10px 14px 7px;border-bottom:2px solid var(--ye);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#stp-hdr h2{font-family:var(--fh);font-size:24px;color:var(--ye);letter-spacing:2px;}
#stp-body{flex:1;overflow-y:auto;padding:12px;}
.stat-section{margin-bottom:14px;}
.stat-section-title{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.stat-lbl{font-size:9px;width:80px;flex-shrink:0;}
.stat-track{flex:1;height:7px;background:var(--s3);border-radius:4px;overflow:hidden;}
.stat-fill{height:100%;border-radius:4px;transition:width .5s,background .5s;}
.stat-val{font-size:9px;font-weight:700;width:28px;text-align:right;}
.xp-row{display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px;}
.xp-track{height:9px;background:var(--s3);border-radius:5px;overflow:hidden;margin-bottom:10px;}
.xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--pk),var(--ye));transition:width .5s;}
#stp-close{margin:8px 12px 10px;padding:11px;background:var(--s2);border:1px solid var(--ye);border-radius:8px;font-family:var(--ff);font-size:10px;font-weight:700;color:var(--ye);cursor:pointer;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div id="hdr-left">
      <h1>EL LOCAL</h1>
      <div class="sub">Polígono · Mejorada del Campo · Día <span id="hday">1</span></div>
    </div>
    <div id="hdr-right">
      <div class="pill gn">💶 <span id="hp-money">400</span>€</div>
      <div class="pill ye">⭐ <span id="hp-seg">0</span></div>
      <div class="pill pk">🗑️ <span id="hp-trash">0</span>%</div>
      <div class="pill cy">❤️ <span id="hp-hp">100</span></div>
    </div>
  </div>
  <div id="daybar"><div id="dayfill" style="width:0%"></div></div>

  <!-- SCENE -->
  <div id="scene">
    <canvas id="iso"></canvas>
    <div id="nbox"></div>

    <!-- ACTION MENU -->
    <div id="amenu">
      <div id="amenu-title">ACCIÓN</div>
      <div id="amenu-btns"></div>
      <div class="am-close" onclick="closeMenu()">✕ cerrar</div>
    </div>

    <!-- SHOP -->
    <div id="shop">
      <div id="shop-hdr">
        <h2>🛒 TIENDA</h2>
        <div id="shop-money">💶 <span id="sm">400</span>€</div>
      </div>
      <div id="shop-tabs"></div>
      <div id="shop-list"></div>
      <button id="shop-close" onclick="closeShop()">✕ CERRAR</button>
    </div>

    <!-- FRIENDS PANEL -->
    <div id="fpanel">
      <div id="fp-hdr">
        <h2>👥 AMIGOS</h2>
        <div style="font-size:9px;color:var(--mu)"><span id="fp-count">0</span>/15 en el local</div>
      </div>
      <div id="fp-list"></div>
      <button id="fp-close" onclick="closeFriends()">✕ CERRAR</button>
    </div>

    <!-- STATS PANEL -->
    <div id="stpanel">
      <div id="stp-hdr">
        <h2>📊 TUS STATS</h2>
        <div style="font-size:9px;color:var(--mu)">Nivel <span id="stp-lvl">1</span></div>
      </div>
      <div id="stp-body"></div>
      <button id="stp-close" onclick="closeStats()">✕ CERRAR</button>
    </div>

    <!-- EVENT OVERLAY -->
    <div id="evlay">
      <div class="evbox" id="evbox">
        <div class="ev-ico" id="ev-ico">⚠️</div>
        <div class="ev-tit" id="ev-tit">EVENTO</div>
        <div class="ev-dsc" id="ev-dsc"></div>
        <div class="ev-btns" id="ev-btns"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bot">
    <div class="bbt hl" onclick="openWork()"><span class="bi">💼</span><span class="bl">Currar</span></div>
    <div class="bbt" onclick="openShop()"><span class="bi">🛒</span><span class="bl">Tienda</span></div>
    <div class="bbt" onclick="openFriends()"><span class="bi">👥</span><span class="bl">Amigos</span></div>
    <div class="bbt" onclick="openStats()"><span class="bi">📊</span><span class="bl">Stats</span></div>
    <div class="bbt cy" onclick="act('skip')"><span class="bi">⏭️</span><span class="bl">Avanzar</span></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ISO ENGINE
// ═══════════════════════════════════════════════════════
const cv  = document.getElementById('iso');
const ctx = cv.getContext('2d');
let CW, CH, SC = 2;

function resize() {
  const el = document.getElementById('scene');
  CW = el.clientWidth; CH = el.clientHeight;
  cv.width  = CW * SC; cv.height = CH * SC;
  cv.style.width = CW+'px'; cv.style.height = CH+'px';
  ctx.scale(SC, SC);
  ctx.imageSmoothingEnabled = false;
}

// Tile size
const TW = 36, TH = 18;
const WALL_H = 52;

// Grid → screen
function iso(gx, gy, gz = 0) {
  const ox = CW / 2, oy = CH * 0.30;
  return {
    x: ox + (gx - gy) * TW / 2,
    y: oy + (gx + gy) * TH / 2 - gz * TH
  };
}

// Screen → closest grid tile
function screenToGrid(sx, sy) {
  const ox = CW / 2, oy = CH * 0.30;
  const rx = sx - ox, ry = sy - oy;
  const gx = (rx / (TW/2) + ry / (TH/2)) / 2;
  const gy = (ry / (TH/2) - rx / (TW/2)) / 2;
  return { gx: Math.floor(gx), gy: Math.floor(gy) };
}

const GRID = 9; // 9×9 nave

// ═══════════════════════════════════════════════════════
//  PALETTE Y2K
// ═══════════════════════════════════════════════════════
const C = {
  // Nave — suelo parqué claro, paredes blancas sucias
  floorA:  '#e8dcc8', floorB:  '#dfd0b8',
  floorL:  '#c4b090', floorR:  '#b8a07a',
  wallF:   '#f0ece2', wallFd:  '#e4ddd0', wallFdd: '#d8d0c0',
  wallS:   '#ddd8cc', wallT:   '#faf8f4',
  skirt:   '#c8b898', skirtD:  '#b8a888',
  conc:    '#c8c0b0', // concrete floor (empty area)
  // Accent Y2K
  pk: '#ff2d78', cy: '#00f5ff', gn: '#aaff00',
  ye: '#ffd600', pu: '#bf5fff', or: '#ff6b00',
};

// ═══════════════════════════════════════════════════════
//  DRAW ROOM
// ═══════════════════════════════════════════════════════
function drawRoom() {
  // Floor tiles
  for (let x = 0; x < GRID; x++) {
    for (let y = 0; y < GRID; y++) {
      drawFloorTile(x, y);
    }
  }

  // Left wall (x = 0, y = 0..GRID)
  for (let y = 0; y < GRID; y++) {
    drawWallLeft(0, y);
  }

  // Back wall (y = 0, x = 0..GRID)
  for (let x = 0; x < GRID; x++) {
    drawWallBack(x, 0);
  }

  // Corner cap
  drawWallCap(0, 0);

  // Wall top caps (left wall)
  for (let y = 1; y < GRID; y++) drawWallCapLeft(0, y);
  // Wall top caps (back wall)
  for (let x = 1; x < GRID; x++) drawWallCapBack(x, 0);

  // Corner vertical edge
  const sc = iso(0, 0);
  ctx.beginPath();
  ctx.moveTo(sc.x, sc.y); ctx.lineTo(sc.x, sc.y - WALL_H);
  ctx.strokeStyle = C.conc; ctx.lineWidth = 1.5; ctx.stroke();

  // Graffiti on left wall
  drawGraffitiLeft();

  // Window on back wall
  drawWindow(4, 0);
  drawWindow(7, 0);

  // Door on left wall
  drawDoor(0, 5);

  // Nave sign
  drawSign();
}

function drawFloorTile(gx, gy) {
  const s = iso(gx, gy);
  const alt = (gx + gy) % 2 === 0;
  // Top face diamond
  ctx.beginPath();
  ctx.moveTo(s.x,          s.y);
  ctx.lineTo(s.x + TW/2,   s.y + TH/2);
  ctx.lineTo(s.x,           s.y + TH);
  ctx.lineTo(s.x - TW/2,   s.y + TH/2);
  ctx.closePath();
  ctx.fillStyle = alt ? C.floorA : C.floorB;
  ctx.fill();
  // Plank grain
  ctx.strokeStyle = 'rgba(160,130,90,0.13)';
  ctx.lineWidth = 0.4;
  ctx.stroke();
  // Horizontal plank line
  if (gx % 2 === 0) {
    ctx.beginPath();
    ctx.moveTo(s.x - TW/2, s.y + TH/2);
    ctx.lineTo(s.x + TW/2, s.y + TH/2);
    ctx.strokeStyle = 'rgba(140,110,70,0.10)';
    ctx.lineWidth = 0.4;
    ctx.stroke();
  }
}

function drawWallBack(gx, gy) {
  const s = iso(gx, gy);
  // Right face of back wall
  ctx.beginPath();
  ctx.moveTo(s.x,         s.y);
  ctx.lineTo(s.x + TW/2,  s.y + TH/2);
  ctx.lineTo(s.x + TW/2,  s.y + TH/2 - WALL_H);
  ctx.lineTo(s.x,          s.y - WALL_H);
  ctx.closePath();
  ctx.fillStyle = C.wallF;
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,90,70,0.08)';
  ctx.lineWidth = 0.4; ctx.stroke();
  // Subtle stain
  ctx.fillStyle = 'rgba(180,160,120,0.05)';
  ctx.fillRect(s.x + 2, s.y - WALL_H + 12, 8, 16);
  // Skirting
  ctx.beginPath();
  ctx.moveTo(s.x,        s.y);
  ctx.lineTo(s.x+TW/2,   s.y+TH/2);
  ctx.lineTo(s.x+TW/2,   s.y+TH/2 - 5);
  ctx.lineTo(s.x,         s.y - 5);
  ctx.closePath();
  ctx.fillStyle = C.skirtD; ctx.fill();
}

function drawWallLeft(gx, gy) {
  const s = iso(gx, gy);
  ctx.beginPath();
  ctx.moveTo(s.x - TW/2,  s.y + TH/2);
  ctx.lineTo(s.x,           s.y);
  ctx.lineTo(s.x,           s.y - WALL_H);
  ctx.lineTo(s.x - TW/2,   s.y + TH/2 - WALL_H);
  ctx.closePath();
  ctx.fillStyle = C.wallS; ctx.fill();
  ctx.strokeStyle = 'rgba(100,90,70,0.08)';
  ctx.lineWidth = 0.4; ctx.stroke();
  // Skirting
  ctx.beginPath();
  ctx.moveTo(s.x - TW/2,  s.y + TH/2);
  ctx.lineTo(s.x,           s.y);
  ctx.lineTo(s.x,           s.y - 5);
  ctx.lineTo(s.x - TW/2,   s.y + TH/2 - 5);
  ctx.closePath();
  ctx.fillStyle = C.skirt; ctx.fill();
}

function drawWallCap(gx, gy) {
  const s = iso(gx, gy);
  const ty = s.y - WALL_H;
  ctx.beginPath();
  ctx.moveTo(s.x,          ty);
  ctx.lineTo(s.x + TW/2,   ty + TH/2);
  ctx.lineTo(s.x,           ty + TH);
  ctx.lineTo(s.x - TW/2,   ty + TH/2);
  ctx.closePath();
  ctx.fillStyle = C.wallT; ctx.fill();
  ctx.strokeStyle = 'rgba(100,90,70,0.15)';
  ctx.lineWidth = 0.4; ctx.stroke();
}

function drawWallCapLeft(gx, gy) {
  const s = iso(gx, gy);
  const ty = s.y - WALL_H;
  ctx.beginPath();
  ctx.moveTo(s.x - TW/2,   ty + TH/2);
  ctx.lineTo(s.x,            ty);
  ctx.lineTo(s.x,            ty + TH);
  ctx.lineTo(s.x - TW/2,    ty + TH*1.5);
  ctx.closePath();
  ctx.fillStyle = '#e0dcd0'; ctx.fill();
}

function drawWallCapBack(gx, gy) {
  const s = iso(gx, gy);
  const ty = s.y - WALL_H;
  ctx.beginPath();
  ctx.moveTo(s.x,          ty);
  ctx.lineTo(s.x + TW/2,   ty + TH/2);
  ctx.lineTo(s.x + TW/2,   ty + TH*1.5);
  ctx.lineTo(s.x,           ty + TH);
  ctx.closePath();
  ctx.fillStyle = '#d8d4c8'; ctx.fill();
}

function drawWindow(gx, gy) {
  const s = iso(gx, gy);
  const wx = s.x, wy = s.y - WALL_H + 10;
  const ww = TW/2 - 2, wh = WALL_H * 0.55;
  // Frame
  ctx.fillStyle = '#c8b888'; ctx.fillRect(wx + 2, wy, ww, wh);
  // Glass
  ctx.fillStyle = 'rgba(100,180,255,0.25)'; ctx.fillRect(wx + 4, wy + 2, ww - 4, wh - 4);
  // Light strip
  ctx.fillStyle = 'rgba(200,230,255,0.35)'; ctx.fillRect(wx + 4, wy + 2, 3, wh - 4);
  // Cross
  ctx.fillStyle = '#c8b888';
  ctx.fillRect(wx + 4, wy + wh/2 - 0.5, ww - 4, 1);
  ctx.fillRect(wx + 4 + ww/2 - 2, wy + 2, 1, wh - 4);
}

function drawDoor(gx, gy) {
  const s = iso(gx, gy);
  const dh = WALL_H * 0.75;
  // Door frame
  ctx.fillStyle = '#b8a888';
  ctx.fillRect(s.x - TW/2 + 4, s.y + TH/2 - dh - 2, TW/2 - 6, dh + 2);
  // Door body
  ctx.fillStyle = '#d4c4a0';
  ctx.fillRect(s.x - TW/2 + 6, s.y + TH/2 - dh, TW/2 - 10, dh);
  // Panels
  ctx.fillStyle = '#c8b890';
  ctx.fillRect(s.x - TW/2 + 8, s.y + TH/2 - dh + 4, TW/2 - 18, dh/2 - 6);
  ctx.fillRect(s.x - TW/2 + 8, s.y + TH/2 - dh/2 + 2, TW/2 - 18, dh/2 - 6);
  // Knob
  ctx.fillStyle = '#ffd600';
  ctx.beginPath();
  ctx.arc(s.x - TW/2 + TW/2 - 11, s.y + TH/2 - dh/2, 2, 0, Math.PI*2);
  ctx.fill();
}

function drawGraffitiLeft() {
  const s = iso(0, 3);
  const gx = s.x - TW/2 + 4, gy = s.y - WALL_H + 14;
  // Tag shape using bezier
  ctx.save();
  ctx.strokeStyle = C.pk; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.moveTo(gx,gx); // simplified blob
  ctx.arc(gx + 8, gy + 5, 6, 0, Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle = C.cy; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(gx+2, gy+14); ctx.lineTo(gx+18, gy+14);
  ctx.stroke();
  ctx.restore();
}

function drawSign() {
  // Cartel "NAVE 7" en la pared de fondo
  const s = iso(2, 0);
  ctx.save();
  ctx.fillStyle = '#111'; ctx.fillRect(s.x + 4, s.y - WALL_H + 8, 28, 12);
  ctx.fillStyle = C.gn;
  ctx.font = 'bold 7px monospace';
  ctx.fillText('NAVE 7', s.x + 6, s.y - WALL_H + 18);
  ctx.restore();
}

// Isometric box renderer
function isoBox(gx, gy, fw, fh, zh, col) {
  const s = iso(gx + fw/2, gy + fh/2);
  const W2 = fw * TW/2, H2 = fh * TH/2, ZH = zh * TH * 2.2;

  // Left face
  ctx.beginPath();
  ctx.moveTo(s.x-W2, s.y);
  ctx.lineTo(s.x,    s.y+H2);
  ctx.lineTo(s.x,    s.y+H2-ZH);
  ctx.lineTo(s.x-W2, s.y-ZH);
  ctx.closePath();
  ctx.fillStyle = col.s||'#555'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=0.5; ctx.stroke();

  // Right face
  ctx.beginPath();
  ctx.moveTo(s.x,    s.y+H2);
  ctx.lineTo(s.x+W2, s.y);
  ctx.lineTo(s.x+W2, s.y-ZH);
  ctx.lineTo(s.x,    s.y+H2-ZH);
  ctx.closePath();
  ctx.fillStyle = col.f||'#777'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=0.5; ctx.stroke();

  // Top face
  ctx.beginPath();
  ctx.moveTo(s.x,    s.y-ZH);
  ctx.lineTo(s.x+W2, s.y-ZH);
  ctx.lineTo(s.x,    s.y+H2-ZH);
  ctx.lineTo(s.x-W2, s.y-ZH);
  ctx.closePath();
  ctx.fillStyle = col.t||'#999'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.5; ctx.stroke();

  return { s, W2, H2, ZH };
}

function drawFurnitureItem(item) {
  const def = SHOP_ITEMS.find(d => d.id === item.id);
  if (!def) return;
  const { gx, gy } = item;
  const c = def.colors;

  const { s, W2, H2, ZH } = isoBox(gx, gy, def.w, def.h, def.zh, c);

  // Special details per item
  if (def.id === 'sofa') {
    // Cushions on top
    const cy2 = s.y - ZH;
    ctx.beginPath(); ctx.ellipse(s.x - W2*0.3, cy2 + TH*0.3, TW*0.2, TH*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = c.x; ctx.fill();
    ctx.beginPath(); ctx.ellipse(s.x + W2*0.1, cy2 + TH*0.3, TW*0.2, TH*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = c.x; ctx.fill();
    // Backrest
    ctx.beginPath();
    ctx.moveTo(s.x - W2, s.y - ZH);
    ctx.lineTo(s.x + W2, s.y - ZH);
    ctx.lineTo(s.x + W2, s.y - ZH - TH*1.4);
    ctx.lineTo(s.x - W2, s.y - ZH - TH*1.4);
    ctx.closePath();
    ctx.fillStyle = c.s; ctx.fill();
  }

  if (def.id === 'bed') {
    // Sheet texture stripe
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(s.x - W2 + i*10, s.y - ZH);
      ctx.lineTo(s.x + i*10,       s.y - ZH + H2);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
    }
    // Pillow
    ctx.beginPath();
    ctx.ellipse(s.x - W2*0.4, s.y - ZH + TH*0.5, TW*0.25, TH*0.3, 0.2, 0, Math.PI*2);
    ctx.fillStyle = '#e3f2fd'; ctx.fill();
    // Headboard back
    ctx.fillStyle = c.s;
    ctx.fillRect(s.x - W2, s.y - ZH - TH*2, W2*2, TH*1.8);
  }

  if (def.id === 'fridge') {
    // Handle
    ctx.strokeStyle = '#dfe6e9'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x + W2*0.6, s.y - ZH*0.3);
    ctx.lineTo(s.x + W2*0.6, s.y - ZH*0.7);
    ctx.stroke();
    // Door split
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y - ZH*0.5);
    ctx.lineTo(s.x + W2, s.y - ZH*0.5 + TH*0.25);
    ctx.stroke();
  }

  if (def.id === 'mic') {
    // Pole
    ctx.strokeStyle = '#b2bec3'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y - ZH - TH*2); ctx.stroke();
    // Mic head
    ctx.beginPath(); ctx.arc(s.x, s.y - ZH - TH*2.2, TW*0.18, 0, Math.PI*2);
    ctx.fillStyle = '#636e72'; ctx.fill();
    ctx.beginPath(); ctx.arc(s.x, s.y - ZH - TH*2.2, TW*0.11, 0, Math.PI*2);
    ctx.fillStyle = '#2d3436'; ctx.fill();
  }

  if (def.id === 'playstation') {
    // Screen
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(s.x - W2*0.6, s.y - ZH - TH*2.5, W2*1.6, TH*2);
    ctx.fillStyle = 'rgba(0,245,255,0.15)';
    ctx.fillRect(s.x - W2*0.55, s.y - ZH - TH*2.4, W2*1.5, TH*1.8);
    // Controller hint
    ctx.fillStyle = '#2d3436';
    ctx.fillRect(s.x - 6, s.y - ZH + 2, 12, 5);
  }

  if (def.id === 'speaker') {
    // Speaker cone
    ctx.beginPath();
    ctx.arc(s.x + W2*0.4, s.y - ZH*0.5 + TH*0.2, TW*0.22, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a2e'; ctx.fill();
    ctx.beginPath();
    ctx.arc(s.x + W2*0.4, s.y - ZH*0.5 + TH*0.2, TW*0.1, 0, Math.PI*2);
    ctx.fillStyle = c.x; ctx.fill();
  }

  if (def.id === 'bar') {
    // Counter top wood
    ctx.fillStyle = '#8d6e63';
    ctx.beginPath();
    ctx.moveTo(s.x - W2, s.y - ZH);
    ctx.lineTo(s.x + W2, s.y - ZH);
    ctx.lineTo(s.x, s.y - ZH + H2);
    ctx.lineTo(s.x - W2*2, s.y - ZH + H2*0.5);
    ctx.closePath(); ctx.fill();
    // Brass rail
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(s.x - W2 + 2, s.y - ZH*0.3);
    ctx.lineTo(s.x + W2 - 2, s.y - ZH*0.3 - TH*0.2);
    ctx.stroke();
  }

  if (def.id === 'plant') {
    // Leaves
    const lx = s.x, ly = s.y - ZH - TH;
    [[-4,-8,10,14],[-8,-14,8,12],[4,-12,9,13],[0,-20,7,10]].forEach(([dx,dy,rx,ry]) => {
      ctx.beginPath();
      ctx.ellipse(lx+dx, ly+dy, rx, ry, dx*0.08, 0, Math.PI*2);
      ctx.fillStyle = c.t; ctx.fill();
    });
    // Pot
    ctx.beginPath();
    ctx.ellipse(lx, ly, TW*0.2, TH*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = '#e17055'; ctx.fill();
  }

  if (def.id === 'lamp') {
    const lx = s.x, ly = s.y - ZH;
    ctx.strokeStyle = '#b2bec3'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, ly - TH*3.8); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(lx-TW*0.3, ly-TH*3.2);
    ctx.lineTo(lx+TW*0.3, ly-TH*3.2);
    ctx.lineTo(lx+TW*0.18, ly-TH*4);
    ctx.lineTo(lx-TW*0.18, ly-TH*4);
    ctx.closePath(); ctx.fillStyle = c.x; ctx.fill();
    ctx.fillStyle='rgba(255,220,0,0.07)';
    ctx.beginPath(); ctx.arc(lx, ly-TH*3.5, TW*0.9, 0, Math.PI*2); ctx.fill();
  }

  if (def.id === 'poster') {
    // Flat on wall (not a box, override)
    // Drawn on back wall at placement
    const ws = iso(gx, 0);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(ws.x + 6, ws.y - WALL_H + 14, 20, 26);
    ctx.strokeStyle = c.x; ctx.lineWidth = 1;
    ctx.strokeRect(ws.x + 6, ws.y - WALL_H + 14, 20, 26);
    ctx.fillStyle = c.x; ctx.fillRect(ws.x + 10, ws.y - WALL_H + 18, 12, 2);
    ctx.fillStyle = 'rgba(191,95,255,0.3)'; ctx.fillRect(ws.x + 10, ws.y - WALL_H + 24, 8, 12);
  }

  if (def.id === 'beanbag') {
    ctx.beginPath();
    ctx.ellipse(s.x, s.y - TH*0.4, TW*0.38, TH*0.55, 0, 0, Math.PI*2);
    ctx.fillStyle = c.t; ctx.fill();
    ctx.strokeStyle = c.s; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(s.x-4, s.y - TH*0.6, TW*0.12, TH*0.18, 0.4, 0, Math.PI*2);
    ctx.fillStyle = c.x; ctx.fill();
  }

  if (def.id === 'trash_bin') {
    ctx.strokeStyle = c.x; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x - 4, s.y - ZH); ctx.lineTo(s.x + 4, s.y - ZH);
    ctx.stroke();
  }

  if (def.id === 'tattoostool') {
    // Arm rest detail
    ctx.fillStyle = '#c0c0c0';
    ctx.beginPath();
    ctx.ellipse(s.x, s.y - ZH - 2, TW*0.35, TH*0.3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(s.x, s.y - ZH - 2, TW*0.22, TH*0.18, 0, 0, Math.PI*2);
    ctx.fill();
  }

  if (def.id === 'camera') {
    // Lens
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(s.x - 8, s.y - ZH - TH, 16, 12);
    ctx.beginPath();
    ctx.arc(s.x, s.y - ZH - TH + 6, 4, 0, Math.PI*2);
    ctx.fillStyle = '#00f5ff'; ctx.fill();
    ctx.beginPath();
    ctx.arc(s.x, s.y - ZH - TH + 6, 2, 0, Math.PI*2);
    ctx.fillStyle = '#000020'; ctx.fill();
  }

  if (def.id === 'table') {
    // Items on table
    ctx.fillStyle = '#cc3322';
    ctx.beginPath(); ctx.arc(s.x - 8, s.y - ZH - 3, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#888'; ctx.fillRect(s.x + 2, s.y - ZH - 4, 6, 4);
  }
}

function drawCharSprite(gx, gy, colorSet, state, facing, selected, bubbleText) {
  const s = iso(gx, gy, 0);
  const x = s.x, y = s.y;
  const c = colorSet;
  const isLeft = facing === 'left';
  const flip = isLeft;

  ctx.save();
  if (flip) { ctx.scale(-1,1); ctx.translate(-CW*2, 0); }
  const rx = flip ? CW*2 - x : x;

  const walk = state === 'walking';
  const sleep = state === 'sleeping';
  const party = state === 'partying';
  const work  = state === 'working';
  const ko    = state === 'ko';
  const t     = Date.now() / 180;
  const legA  = walk ? Math.sin(t) * 4 : 0;
  const armA  = walk ? Math.sin(t + Math.PI) * 3 : 0;
  const bob   = party ? Math.sin(t*2) * 2 : 0;

  if (ko) {
    // Lying down
    ctx.fillStyle = c.pants;  ctx.fillRect(rx-6, y+2, 13, 4);
    ctx.fillStyle = c.shirt;  ctx.fillRect(rx-3, y-1, 8, 4);
    ctx.fillStyle = c.skin;   ctx.fillRect(rx+5, y-3, 6, 5);
    ctx.fillStyle = c.hair;   ctx.fillRect(rx+5, y-4, 6, 3);
    ctx.fillStyle = c.shoe;   ctx.fillRect(rx-7, y+4, 4, 2);
    ctx.fillStyle = c.shoe;   ctx.fillRect(rx-1, y+4, 4, 2);
    // ZZ
    ctx.fillStyle = '#aaaaff'; ctx.font='bold 7px monospace';
    ctx.fillText('z z', rx+9, y-5);
    ctx.restore(); return;
  }

  // SHADOW
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(rx, y+8+bob, 7, 3, 0, 0, Math.PI*2); ctx.fill();

  // SHOES
  ctx.fillStyle = c.shoe;
  ctx.fillRect(rx-5+legA, y+6+bob, 5, 3);
  ctx.fillRect(rx+1-legA, y+6+bob, 5, 3);

  // LEGS
  ctx.fillStyle = c.pants;
  ctx.fillRect(rx-4+legA, y-1+bob, 4, 8);
  ctx.fillRect(rx+1-legA, y-1+bob, 4, 8);

  // BODY
  ctx.fillStyle = c.shirt;
  ctx.fillRect(rx-5, y-9+bob, 11, 9);

  // ARMS
  ctx.fillStyle = c.skin;
  if (party) {
    ctx.fillRect(rx-8, y-13+bob+armA, 3, 7);
    ctx.fillRect(rx+6, y-13+bob-armA, 3, 7);
  } else if (sleep) {
    ctx.fillRect(rx-6, y-6+bob, 13, 3);
  } else {
    ctx.fillRect(rx-8, y-8+bob+armA, 3, 7);
    ctx.fillRect(rx+6, y-8+bob-armA, 3, 7);
  }

  // HEAD
  ctx.fillStyle = c.skin;
  ctx.fillRect(rx-4, y-17+bob, 9, 9);

  // HAIR
  ctx.fillStyle = c.hair;
  ctx.fillRect(rx-4, y-17+bob, 9, 3);
  ctx.fillRect(rx-5, y-16+bob, 2, 5);
  ctx.fillRect(rx+4, y-16+bob, 2, 5);

  // FACE
  if (!sleep) {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(rx-2, y-12+bob, 2, 2);
    ctx.fillRect(rx+2, y-12+bob, 2, 2);
    if (party || work) {
      ctx.fillStyle = '#cc4420';
      ctx.fillRect(rx-1, y-9+bob, 3, 1);
    }
  } else {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(rx-2, y-12+bob, 3, 1);
    ctx.fillRect(rx+2, y-12+bob, 3, 1);
  }

  // ACCESSORIES
  if (colorSet === CHAR_COLORS[3]) { // cap
    ctx.fillStyle = '#ff6b00';
    ctx.fillRect(rx-5, y-18+bob, 10, 2);
    ctx.fillRect(rx-6, y-17+bob, 2, 2);
  }
  if (colorSet === CHAR_COLORS[4]) { // shades
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(rx-3, y-13+bob, 3, 2);
    ctx.fillRect(rx+1, y-13+bob, 3, 2);
    ctx.fillStyle = '#333';
    ctx.fillRect(rx,   y-13+bob, 1, 2);
  }

  // SELECTED GLOW
  if (selected) {
    ctx.fillStyle = 'rgba(255,45,120,0.12)';
    ctx.beginPath();
    ctx.ellipse(rx, y+2+bob, 10, 4, 0, 0, Math.PI*2);
    ctx.fill();
    // Selection ring
    ctx.strokeStyle = '#ff2d78';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(rx, y+8+bob, 8, 3.5, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // BUBBLE
  if (bubbleText) {
    const bx = rx + 10, by = y - 20 + bob;
    ctx.fillStyle = 'rgba(17,17,30,0.95)';
    ctx.beginPath();
    ctx.roundRect(bx, by, 28, 13, 4);
    ctx.fill();
    ctx.strokeStyle = '#ff2d78'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 6px monospace';
    ctx.fillText(bubbleText.slice(0,6), bx+3, by+9);
    // Tail
    ctx.fillStyle = 'rgba(17,17,30,0.95)';
    ctx.beginPath();
    ctx.moveTo(bx, by+13);
    ctx.lineTo(bx-4, by+17);
    ctx.lineTo(bx+4, by+13);
    ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

let G = null;
let animId = null;
let lastT = 0;
let secAcc = 0;
const DAY_SECS = 90;

function initGame() {
  G = {
    day: 1, time: 0,
    money: 400, seg: 0, rep: 50,
    hp: 100, energy: 100,
    hunger: 80, sleep: 80,
    trash: 5, chaos: 0,
    xp: 0, level: 1,
    // Skills
    skills: { cantar:0, tatuar:0, fotos:0, stream:0 },
    // Placed furniture
    placed: [],
    // Friends in the local
    friends: [],
    // Player char
    player: {
      gx: 4, gy: 4,
      tx: 4, ty: 4,
      state: 'idle',
      facing: 'right',
      bubble: null, bubbleT: 0,
    },
    running: true, gameover: false,
  };

  // Close all panels
  ['shop','fpanel','stpanel','evlay'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('amenu').classList.remove('on');

  renderShopTabs();
  renderFriendsPanel();
  updateHUD();

  if (animId) cancelAnimationFrame(animId);
  lastT = performance.now();
  animId = requestAnimationFrame(loop);

  notify('Sistema', '🏚️ Bienvenido a la Nave 7, Polígono de Mejorada. Toca la nave para moverte. Pulsa "Currar" para ganar pasta.', 'b');
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
function loop(now) {
  const dt = Math.min((now - lastT)/1000, 0.12);
  lastT = now;

  if (G.running && !G.gameover) update(dt);
  render();
  animId = requestAnimationFrame(loop);
}

function update(dt) {
  secAcc += dt;
  G.time += dt / DAY_SECS;
  document.getElementById('dayfill').style.width = (Math.min(G.time,1)*100)+'%';
  document.getElementById('hday').textContent = G.day;

  // Move player toward target
  const p = G.player;
  const dx = p.tx - p.gx, dy = p.ty - p.gy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 0.08) {
    const spd = 2.5;
    p.gx += (dx/dist) * spd * dt;
    p.gy += (dy/dist) * spd * dt;
    p.state = 'walking';
    p.facing = dx < 0 ? 'left' : 'right';
  } else {
    p.gx = p.tx; p.gy = p.ty;
    if (p.state === 'walking') p.state = 'idle';
  }

  // Bubble timer
  if (p.bubbleT > 0) { p.bubbleT -= dt; if (p.bubbleT <= 0) p.bubble = null; }

  // Stat decay per second
  if (secAcc >= 1) {
    secAcc -= 1;
    G.hunger  = Math.max(0, G.hunger  - 0.8);
    G.sleep   = Math.max(0, G.sleep   - 0.6);
    G.energy  = Math.max(0, G.energy  - 0.4);
    G.trash   = Math.min(100, G.trash + 0.4);
    G.chaos   = Math.max(0, G.chaos   - 0.2);

    // Furniture bonuses
    if (G.placed.some(p=>p.id==='plant'))     G.trash = Math.max(0, G.trash-0.3);
    if (G.placed.some(p=>p.id==='trash_bin')) G.trash = Math.max(0, G.trash-0.5);
    if (G.placed.some(p=>p.id==='fridge'))    G.hunger = Math.min(100, G.hunger+0.4);
    if (G.placed.some(p=>p.id==='lamp'))      G.rep = Math.min(100, G.rep+0.01);

    // HP affected by stats
    if (G.hunger < 15) G.hp = Math.max(0, G.hp-1);
    if (G.sleep  < 15) G.hp = Math.max(0, G.hp-0.5);
    if (G.trash  > 80) G.hp = Math.max(0, G.hp-0.5);

    updateHUD();
  }

  // Day end
  if (G.time >= 1) { G.time = 0; endDay(); }

  // HP zero = game over
  if (G.hp <= 0) triggerGameOver('Tu salud llegó a cero. La vida en la nave te pudo. 💀');
}

function endDay() {
  G.day++;
  G.money -= 15; // daily costs (luz, agua)
  G.trash  = Math.min(100, G.trash + 4);

  // Friend effects
  G.friends.forEach(f => {
    const def = FRIEND_DEFS.find(d=>d.id===f.id);
    if (!def) return;
    if (Math.random() < 0.15) { // bad event chance
      if (def.bad === 'steal')    { G.money = Math.max(0, G.money-30); notify(def.name,'Te ha birlado 30€ de la caja. Classic Leo. 😒','r'); }
      if (def.bad === 'ruido')    { G.chaos += 10; notify(def.name,'Ha armado un ruido de locos anoche.','r'); }
      if (def.bad === 'no_rent')  { notify(def.name,'Rebe dice que este mes no puede pagar. Obvio.','r'); }
      if (def.bad === 'food_drain'){ G.hunger = Math.max(0, G.hunger-15); notify(def.name,'Iván se ha comido todo lo de la nevera.','r'); }
    } else {
      if (def.good === 'follow_boost') { G.seg += 30; }
      if (def.good === 'food_boost')   { G.hunger = Math.min(100, G.hunger+20); }
      if (def.good === 'music_boost')  { G.seg += 20; }
      if (def.good === 'repair')       { G.chaos = Math.max(0, G.chaos-10); }
    }
  });

  // Alquiler mensual día 30
  if (G.day % 30 === 0) {
    triggerEvent({
      ico:'👴', tit:'FIN DE MES — ALQUILER',
      dsc:`Han pasado 30 días. El casero quiere 400€. Tienes ${G.money}€ en caja.`,
      evbox_cls:'',
      choices:[
        { lbl:'Pagar 400€', cls:'p', fn:g=>{ if(g.money>=400){g.money-=400;notify('Casero','Pagado. Seguid así.','g');}else triggerGameOver('Sin dinero para el alquiler. Desahucio. 👴'); }},
      ]
    });
    return;
  }

  // Level up check
  const xpNeeded = G.level * 200;
  if (G.xp >= xpNeeded) { G.level++; G.xp -= xpNeeded; notify('Sistema',`🆙 NIVEL ${G.level}! Nuevas oportunidades desbloqueadas.`,'g'); }

  // Random event
  for (const ev of EVENTS) {
    if (Math.random() < ev.chance) { triggerEvent(ev); return; }
  }

  notify('', `☀️ Día ${G.day} — Tienes ${G.money}€ y ${Math.round(G.seg)} seguidores`);
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, CW, CH);

  // BG gradient
  const grad = ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,'#0d0d1a');
  grad.addColorStop(1,'#0a0a12');
  ctx.fillStyle = grad; ctx.fillRect(0,0,CW,CH);

  drawRoom();

  // Sort render: furniture + player by gy+gx (painter's algo)
  const renderables = [];

  G.placed.forEach(item => {
    const def = SHOP_ITEMS.find(d=>d.id===item.id);
    if (def) renderables.push({ sortKey: item.gy + item.gx + def.h + def.w, type:'furniture', item, def });
  });

  renderables.push({ sortKey: G.player.gy + G.player.gx, type:'player' });

  G.friends.forEach((f,i) => {
    renderables.push({ sortKey: f.gy + f.gx + 0.5, type:'friend', f, i });
  });

  renderables.sort((a,b) => a.sortKey - b.sortKey);

  renderables.forEach(r => {
    if (r.type === 'furniture') {
      drawFurnitureItem(r.item);
    } else if (r.type === 'player') {
      const p = G.player;
      drawCharSprite(p.gx, p.gy, CHAR_COLORS[0], p.state, p.facing, true, p.bubble);
    } else if (r.type === 'friend') {
      const f = r.f;
      drawCharSprite(f.gx, f.gy, NPC_COLORS[r.i % NPC_COLORS.length], f.state||'idle', f.facing||'right', false, f.bubble);
    }
  });

  // Day/night tint
  const t = G.time;
  const nightAlpha = t > 0.75 ? (t-0.75)*1.5*0.35 : t < 0.1 ? (0.1-t)*3.5*0.35 : 0;
  if (nightAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,20,${nightAlpha})`;
    ctx.fillRect(0,0,CW,CH);
  }
}

// ═══════════════════════════════════════════════════════
//  TOUCH / CLICK → move player / open menu
// ═══════════════════════════════════════════════════════
cv.addEventListener('click', e => {
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX - rect.left), my = (e.clientY - rect.top);
  const { gx, gy } = screenToGrid(mx, my);

  if (gx < 0 || gx >= GRID || gy < 0 || gy >= GRID) return;

  // Check if tapped on furniture
  const hit = G.placed.find(it => {
    const def = SHOP_ITEMS.find(d=>d.id===it.id);
    return gx >= it.gx && gx < it.gx+(def?.w||1) && gy >= it.gy && gy < it.gy+(def?.h||1);
  });

  if (hit) {
    openFurnitureMenu(hit, mx, my);
    return;
  }

  // Check if tapped on friend
  const friendHit = G.friends.find(f => Math.abs(f.gx - gx) < 1 && Math.abs(f.gy - gy) < 1);
  if (friendHit) {
    openFriendMenu(friendHit, mx, my);
    return;
  }

  // Move player
  G.player.tx = Math.max(0.5, Math.min(GRID-1.5, gx + 0.5));
  G.player.ty = Math.max(0.5, Math.min(GRID-1.5, gy + 0.5));
  closeMenu();
});

// ═══════════════════════════════════════════════════════
//  ACTION MENU
// ═══════════════════════════════════════════════════════
function openFurnitureMenu(item, mx, my) {
  const def = SHOP_ITEMS.find(d=>d.id===item.id);
  if (!def) return;
  const menu = document.getElementById('amenu');
  document.getElementById('amenu-title').textContent = def.ico + ' ' + def.name.toUpperCase();
  const btns = document.getElementById('amenu-btns');
  btns.innerHTML = '';

  // Use action based on item
  const actions = getFurnitureActions(item, def);
  actions.forEach(a => {
    const b = document.createElement('div');
    b.className = 'am-btn ' + (a.cls||'');
    b.textContent = a.lbl;
    b.onclick = () => { a.fn(); closeMenu(); };
    btns.appendChild(b);
  });

  positionMenu(menu, mx, my);
  menu.classList.add('on');
}

function getFurnitureActions(item, def) {
  const actions = [];
  if (def.id === 'fridge') {
    actions.push({ lbl:'🍕 Comer (gratis)', cls:'grn', fn:()=>{ G.hunger=Math.min(100,G.hunger+45); G.player.bubble='NOM'; G.player.bubbleT=2; notify('Tú','Om nom nom 🍕','g'); }});
  }
  if (def.id === 'bed' || def.id === 'mattress') {
    actions.push({ lbl:'😴 Dormir (recuperar)', cls:'blu', fn:()=>{ G.sleep=Math.min(100,G.sleep+50); G.energy=Math.min(100,G.energy+30); G.player.state='sleeping'; G.player.bubble='ZZZ'; G.player.bubbleT=3; notify('Tú','Siesta de 20 minutos... o de 8 horas.','b'); setTimeout(()=>{ G.player.state='idle'; G.player.bubble=null; }, 3000); }});
  }
  if (def.id === 'sofa' || def.id === 'beanbag') {
    actions.push({ lbl:'😌 Descansar', cls:'', fn:()=>{ G.energy=Math.min(100,G.energy+20); G.player.bubble='😌'; G.player.bubbleT=2; notify('Tú','Un ratito en el sofá. Bien merecido.','g'); }});
  }
  if (def.id === 'mic') {
    actions.push({ lbl:'🎤 Cantar / Directo', cls:'red', fn:()=>doWork('cantar') });
  }
  if (def.id === 'tattoostool') {
    actions.push({ lbl:'💉 Tatuar cliente', cls:'red', fn:()=>doWork('tatuar') });
  }
  if (def.id === 'camera') {
    actions.push({ lbl:'📷 Sesión de fotos', cls:'red', fn:()=>doWork('fotos') });
  }
  if (def.id === 'playstation') {
    actions.push({ lbl:'🎮 Streamear', cls:'blu', fn:()=>doWork('stream') });
  }
  if (def.id === 'bar') {
    actions.push({ lbl:'🍺 Abrir barra', cls:'yel', fn:()=>{ G.money+=Math.floor(Math.random()*40+20); G.rep=Math.min(100,G.rep+5); notify('Barra','Noche de barra: +€ y +rep 🍺','g'); }});
  }
  if (def.id === 'speaker') {
    actions.push({ lbl:'🎉 Poner música', cls:'red', fn:()=>{ G.friends.forEach(f=>{ f.state='partying'; f.bubble='🎉'; setTimeout(()=>{ f.state='idle'; f.bubble=null; },4000); }); notify('Local','¡La nave peta! 🔊','g'); }});
  }
  actions.push({ lbl:'🗑️ Quitar mueble', cls:'', fn:()=>{ G.placed=G.placed.filter(p=>p!==item); notify('Sistema','Mueble retirado.'); }});
  return actions;
}

function openWork() {
  const evl = document.getElementById('evlay');
  document.getElementById('ev-ico').textContent = '💼';
  document.getElementById('ev-tit').textContent = 'CURRAR';
  document.getElementById('ev-tit').className = 'ev-tit cy';
  document.getElementById('ev-dsc').textContent = 'Elige qué hacer hoy. Cada acción tiene consecuencias.';
  document.getElementById('evbox').className = 'evbox cy';

  const btns = document.getElementById('ev-btns');
  btns.innerHTML = '';

  WORK_ACTIONS.forEach(w => {
    // Check requirement
    const hasReq = !w.req || G.placed.some(p=>p.id===w.req);
    if (!hasReq) return; // hide if not unlocked

    const b = document.createElement('button');
    b.className = 'ev-btn ' + (w.req ? 'c' : 's');
    b.innerHTML = `${w.ico} ${w.name}<br><span style="font-size:7px;opacity:.7">${w.desc}</span>`;
    b.style.textAlign='left'; b.style.lineHeight='1.4';
    b.onclick = () => {
      doWork(w.id);
      evl.classList.remove('on');
    };
    btns.appendChild(b);
  });

  // Close button
  const bc = document.createElement('button');
  bc.className = 'ev-btn s';
  bc.textContent = '✕ Cerrar';
  bc.onclick = () => evl.classList.remove('on');
  btns.appendChild(bc);

  evl.classList.add('on');
}

function doWork(id) {
  if (G.energy < 10) { notify('Tú','Estás demasiado cansado para trabajar.','r'); return; }
  const w = WORK_ACTIONS.find(x=>x.id===id);
  if (!w) return;

  if (id === 'nada') {
    G.energy = Math.min(100, G.energy + 20);
    G.sleep  = Math.min(100, G.sleep  + 10);
    G.player.state = 'sleeping'; G.player.bubble = 'ZZZ'; G.player.bubbleT = 3;
    notify('Tú','No has hecho nada. Válido. 🛌','b');
    setTimeout(()=>{ G.player.state='idle'; G.player.bubble=null; }, 3000);
    return;
  }
  if (id === 'limpiar') {
    G.trash = Math.max(0, G.trash-30);
    G.energy = Math.max(0, G.energy-15);
    G.rep = Math.min(100, G.rep+5);
    G.player.bubble='🧹'; G.player.bubbleT=2;
    notify('Tú','La nave está bastante más decente. 🧹','g');
    G.xp += 10;
    return;
  }
  if (id === 'chatear') {
    const earned = rnd(w.money);
    const segG   = rnd(w.seg);
    G.money += earned; G.seg += segG;
    G.energy = Math.max(0, G.energy-w.energy);
    G.player.bubble='📱'; G.player.bubbleT=2;
    notify('Tú',`Chateando: +${segG} seguidores, +${earned}€ 📱`,'b');
    G.xp += 5;
    return;
  }
  if (id === 'rebuscar') {
    const earned = rnd(w.money);
    G.money += earned;
    G.energy = Math.max(0, G.energy-w.energy);
    notify('Tú',`Rebuscando cupones: +${earned}€ 🧾`,'y');
    G.xp += 5;
    return;
  }

  // Skill-based actions
  const skill = G.skills[id] || 0;
  const skillBonus = 1 + skill * 0.15;
  const earned = Math.floor(rnd(w.money) * skillBonus);
  const segG   = Math.floor(rnd(w.seg)   * skillBonus);

  G.money  += earned;
  G.seg    += segG;
  G.energy  = Math.max(0, G.energy - w.energy);
  G.hunger  = Math.max(0, G.hunger - 10);
  G.skills[id] = Math.min(10, (G.skills[id]||0) + 1);
  G.xp     += 30;

  G.player.state = 'working'; G.player.bubble = w.ico; G.player.bubbleT = 3;
  setTimeout(()=>{ if(G.player.state==='working'){G.player.state='idle'; G.player.bubble=null;} }, 3000);

  // Fail chance decreases with skill
  const failChance = Math.max(0.05, 0.35 - skill*0.03);
  if (Math.random() < failChance) {
    notify('Tú',`${w.ico} ${w.name}: algo salió mal. +${earned}€, +${segG} segs. Skill: ${G.skills[id]}/10`,'r');
  } else {
    notify('Tú',`${w.ico} ${w.name}: bien hecho! +${earned}€, +${segG} segs 🔥`,'g');
  }
  updateHUD();
}

function rnd([min,max]) { return Math.floor(Math.random()*(max-min+1))+min; }

// ═══════════════════════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════════════════════
const CATS = ['Básicos','Trabajo','Ambiente'];
let shopCat = 'Básicos';

function renderShopTabs() {
  const tabs = document.getElementById('shop-tabs');
  tabs.innerHTML = '';
  CATS.forEach(cat => {
    const t = document.createElement('div');
    t.className = 'stab' + (shopCat===cat?' on':'');
    t.textContent = cat;
    t.onclick = () => { shopCat=cat; renderShopTabs(); renderShopList(); };
    tabs.appendChild(t);
  });
  renderShopList();
}

function renderShopList() {
  const list = document.getElementById('shop-list');
  list.innerHTML = '';
  document.getElementById('sm').textContent = G.money;

  SHOP_ITEMS.filter(it=>it.cat===shopCat).forEach(it => {
    const owned = G.placed.some(p=>p.id===it.id);
    const can   = G.money >= it.price;
    const card  = document.createElement('div');
    card.className = 'scard' + (owned?' owned':'') + (!owned&&can?' can':'');
    card.innerHTML = `
      <div class="scard-ico">${it.ico}</div>
      <div class="scard-name">${it.name}</div>
      <div class="scard-fx">${it.fx}</div>
      <div class="scard-desc">${it.desc}</div>
      <div class="scard-price">${owned?'✓ COMPRADO':'€'+it.price}</div>
    `;
    if (!owned) {
      card.onclick = () => buyItem(it);
    }
    list.appendChild(card);
  });
}

function buyItem(it) {
  if (G.money < it.price) { notify('Sistema','No tienes suficiente dinero 💸','r'); return; }
  if (G.placed.some(p=>p.id===it.id)) { notify('Sistema','Ya tienes este objeto.'); return; }

  G.money -= it.price;

  // Find free placement spot
  let px2 = 2, py2 = 2;
  outer: for (let y=1; y<GRID-it.h; y++) {
    for (let x=1; x<GRID-it.w; x++) {
      const blocked = G.placed.some(p=>{
        const def=SHOP_ITEMS.find(d=>d.id===p.id);
        return x<p.gx+(def?.w||1)&&x+it.w>p.gx&&y<p.gy+(def?.h||1)&&y+it.h>p.gy;
      });
      if (!blocked) { px2=x; py2=y; break outer; }
    }
  }

  G.placed.push({ id:it.id, gx:px2, gy:py2 });
  notify('Tienda',`${it.ico} ${it.name} colocado en la nave! ${it.fx}`,'g');
  renderShopList();
  updateHUD();
}

function openShop()  { document.getElementById('shop').classList.add('on'); renderShopTabs(); }
function closeShop() { document.getElementById('shop').classList.remove('on'); }

function renderFriendsPanel() {
  const list = document.getElementById('fp-list');
  list.innerHTML = '';
  document.getElementById('fp-count').textContent = G.friends.length;

  FRIEND_DEFS.forEach(def => {
    const inLocal = G.friends.some(f=>f.id===def.id);
    const card = document.createElement('div');
    card.className = 'fcard' + (inLocal?' invited':'');
    card.innerHTML = `
      <div class="fcard-ico">${def.emoji}</div>
      <div class="fcard-info">
        <div class="fcard-name">${def.name}</div>
        <div class="fcard-role">${def.role}</div>
        <div class="fcard-traits">${def.traits.map(t=>`<span class="ftrait ${t.startsWith('+')?' g':'r'}">${t}</span>`).join('')}</div>
      </div>
      <button class="fcard-btn ${inLocal?'kick':'inv'}" onclick="${inLocal?`kickFriend('${def.id}')`:`inviteFriend('${def.id}')`}">${inLocal?'Echar':'Invitar'}</button>
    `;
    list.appendChild(card);
  });
}

function inviteFriend(id) {
  if (G.friends.length >= 15) { notify('Sistema','Ya hay 15 personas en el local. Límite máximo.','r'); return; }
  if (G.friends.some(f=>f.id===id)) return;
  const def = FRIEND_DEFS.find(d=>d.id===id);
  G.friends.push({
    id, gx:1+Math.random()*6, gy:1+Math.random()*6,
    state:'idle', facing:'right', bubble:null
  });
  notify(def.name, `${def.emoji} ${def.name} ha llegado al local.`,'b');
  renderFriendsPanel();
}

function kickFriend(id) {
  const def = FRIEND_DEFS.find(d=>d.id===id);
  G.friends = G.friends.filter(f=>f.id!==id);
  notify('Sistema',`${def.name} se ha ido del local.`);
  renderFriendsPanel();
}

function openFriends()  { document.getElementById('fpanel').classList.add('on'); renderFriendsPanel(); }
function closeFriends() { document.getElementById('fpanel').classList.remove('on'); }

// ═══════════════════════════════════════════════════════
function triggerEvent(ev) {
  G.running = false;
  document.getElementById('ev-ico').textContent = ev.ico;
  document.getElementById('ev-tit').textContent = ev.tit;
  document.getElementById('ev-tit').className = 'ev-tit' + (ev.tit_cls ? ' '+ev.tit_cls : '');
  document.getElementById('ev-dsc').textContent = ev.dsc;
  document.getElementById('evbox').className = 'evbox' + (ev.evbox_cls ? ' '+ev.evbox_cls : '');

  const btns = document.getElementById('ev-btns');
  btns.innerHTML = '';
  ev.choices.forEach(ch => {
    const b = document.createElement('button');
    b.className = 'ev-btn ' + ch.cls;
    b.textContent = ch.lbl;
    b.onclick = () => {
      ch.fn(G);
      document.getElementById('evlay').classList.remove('on');
      G.running = true;
      updateHUD();
    };
    btns.appendChild(b);
  });
  document.getElementById('evlay').classList.add('on');
}

function triggerGameOver(reason) {
  G.gameover = true; G.running = false;
  triggerEvent({
    ico:'💀', tit:'GAME OVER', dsc:reason,
    choices:[{ lbl:'VOLVER A EMPEZAR', cls:'p', fn:()=>{ initGame(); }}]
  });
}

// ═══════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════
function updateHUD() {
  if (!G) return;
  document.getElementById('hp-money').textContent = G.money;
  document.getElementById('hp-seg').textContent   = G.seg >= 1000 ? (G.seg/1000).toFixed(1)+'k' : G.seg;
  document.getElementById('hp-trash').textContent = Math.round(G.trash)+'%';
  document.getElementById('hp-hp').textContent    = Math.round(G.hp);

  const mp = document.getElementById('hp-money').parentElement;
  mp.className = 'pill' + (G.money<50?' pk':G.money<200?' ye':' gn');
}

// ═══════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════
function notify(sender, msg, type='') {
  const area = document.getElementById('nbox');
  const el   = document.createElement('div');
  el.className = 'notif ' + type;
  el.innerHTML = (sender?`<div class="nsend">${sender}</div>`:'')+msg;
  area.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .4s'; el.style.opacity='0'; setTimeout(()=>el.remove(),400); }, 3200);
}
