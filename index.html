<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cazadores de la Anaconda</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Estilos rápidos para el panel online */
        #online-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #2ecc71;
        }
        #peer-id-input {
            padding: 8px;
            width: 70%;
            border-radius: 4px;
            border: none;
            margin-bottom: 10px;
        }
        .status-msg { font-size: 0.9em; color: #2ecc71; margin-top: 5px; }
        #my-id-display { font-weight: bold; color: #fff; background: #222; padding: 2px 5px; }
    </style>
</head>
<body>
    <div id="menu-screen" class="screen active">
        <h1>🐍 Cazadores de la Anaconda</h1>
        <p>Juego cooperativo Online</p>

        <div id="online-panel">
            <p>Tu ID: <span id="my-id-display">Cargando...</span></p>
            <input type="text" id="peer-id-input" placeholder="Pega el ID de tu amigo">
            <button id="join-btn" style="background: #27ae60; padding: 8px;">CONECTAR</button>
            <div id="connection-status" class="status-msg">Esperando conexión...</div>
        </div>

        <button id="start-btn">INICIAR AVENTURA</button>

        <div class="instructions">
            <p>Host: Controla lado izquierdo | Invitado: Lado derecho</p>
            <p>¡Copien el ID y pásenlo por WhatsApp!</p>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-header">
            <div id="level-indicator">Fase 1</div>
            <div id="cooperation-meter">
                <span>Cooperación:</span>
                <div id="coop-bar"><div id="coop-fill"></div></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="controls-container">
            <div id="controls-p1" class="controls">
                <button class="ctrl-btn" data-action="up">↑</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-action="left">←</button>
                    <button class="ctrl-btn action-btn" data-action="action">⚡</button>
                    <button class="ctrl-btn" data-action="right">→</button>
                </div>
                <button class="ctrl-btn" data-action="down">↓</button>
            </div>
            
            <div id="controls-p2" class="controls">
                <button class="ctrl-btn" data-action="up">↑</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-action="left">←</button>
                    <button class="ctrl-btn action-btn" data-action="action">⚡</button>
                    <button class="ctrl-btn" data-action="right">→</button>
                </div>
                <button class="ctrl-btn" data-action="down">↓</button>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <h1>🎉 ¡VICTORIA! 🎉</h1>
        <p>¡Han atrapado a la anaconda!</p>
        <div id="final-stats"></div>
        <button id="replay-btn">JUGAR DE NUEVO</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/player.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/cooperative.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
